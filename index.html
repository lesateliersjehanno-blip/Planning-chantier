<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Planning Chantier — Jehanno</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root{--bg:#fff;--bg2:#f5f5f5;--bg3:#ebebeb;--border:#e0e0e0;--text:#1a1a1a;--text2:#666;--text3:#999;--blue:#378ADD;--rs:5px;--shadow:0 2px 16px rgba(0,0,0,.10);}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--border:#3a3a3c;--text:#f0f0f0;--text2:#aaa;--text3:#666;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;}

header{background:var(--bg);border-bottom:.5px solid var(--border);padding:10px 14px;position:sticky;top:0;z-index:50;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.header-top h1{font-size:16px;font-weight:600;}
.sync-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;transition:background .3s;}
.sync-dot.ok{background:#4caf50;}.sync-dot.syncing{background:#ff9800;animation:pulse 1s infinite;}.sync-dot.err{background:#f44336;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.toolbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.btn{font-size:12px;padding:5px 11px;border-radius:var(--rs);border:.5px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;height:30px;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;}
.btn:active{background:var(--bg3);}.btn.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.nav-btn{width:30px;height:30px;border-radius:var(--rs);border:.5px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.nav-btn:active{background:var(--bg3);}
.sep{width:.5px;height:20px;background:var(--border);margin:0 2px;}
.month-lbl{font-size:12px;font-weight:600;min-width:90px;text-align:center;}

/* PANEL */
.panel{display:none;padding:10px 14px 12px;background:var(--bg);border-bottom:.5px solid var(--border);}
.panel.open{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;}
.cal-grid-wrap{min-width:210px;}
.cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:10px;color:var(--text3);margin-bottom:4px;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day{height:30px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:var(--text);position:relative;}
.cal-day:hover{background:var(--bg2);}
.cal-day.other-month{color:var(--text3);}.cal-day.is-today{font-weight:700;color:var(--blue);}
.cal-day.in-range{background:#EAF3FD;}.cal-day.range-start{background:var(--blue);color:#fff;border-radius:6px 0 0 6px;}
.cal-day.range-end{background:var(--blue);color:#fff;border-radius:0 6px 6px 0;}.cal-day.range-start.range-end{border-radius:6px;}
.cal-day.wknd-day{color:#aaa;}.cal-day.wknd-day.in-range{background:#ebebeb;}
.cal-day.ferie-day::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#f44336;}
.days-picker{display:flex;flex-direction:column;gap:8px;min-width:160px;}
.days-picker label{font-size:11px;color:var(--text2);font-weight:500;}
.days-presets{display:flex;gap:5px;flex-wrap:wrap;}
.days-presets button{font-size:11px;padding:4px 10px;border-radius:var(--rs);border:.5px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;}
.days-presets button.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.days-custom{display:flex;align-items:center;gap:6px;margin-top:2px;}
.days-custom input{width:60px;font-size:13px;padding:5px 8px;border-radius:var(--rs);border:.5px solid var(--border);background:var(--bg2);color:var(--text);}

/* FILTRES */
.filters-bar{display:flex;align-items:center;gap:6px;padding:7px 14px;border-bottom:.5px solid var(--border);flex-wrap:wrap;}
.filter-label{font-size:11px;color:var(--text3);}
.act-chip{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid transparent;white-space:nowrap;user-select:none;transition:opacity .15s,transform .1s;}
.act-chip:active{transform:scale(.95);}.act-chip.off{opacity:.25;filter:grayscale(.4);}

/* GANTT */
#gantt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{border-collapse:collapse;min-width:max-content;}
th,td{border-right:.5px solid var(--border);border-bottom:.5px solid var(--border);}
thead th{background:var(--bg2);color:var(--text2);font-weight:500;font-size:11px;text-align:center;padding:5px 3px;white-space:nowrap;}
thead th.team-col{text-align:left;padding-left:10px;position:sticky;left:0;z-index:3;min-width:115px;width:115px;background:var(--bg2);}
thead th.month-hd{font-size:12px;font-weight:600;color:var(--text);}
thead th.day-normal{width:120px;min-width:120px;}
thead th.day-slim{width:28px;min-width:28px;font-size:9px;padding:3px 1px;}
thead th.wknd{background:var(--bg3);}
thead th.ferie{background:#FFE8E8;}
thead th.today-hd{background:#E8820C;color:#fff;font-weight:700;}

.team-cell{position:sticky;left:0;background:var(--bg);z-index:2;width:115px;min-width:115px;max-width:115px;padding:6px 7px;vertical-align:top;border-left:3px solid transparent;}
.compagnon-row{display:flex;align-items:center;gap:4px;margin-bottom:3px;}
.comp-name{font-size:11px;font-weight:500;color:var(--text);padding:1px 3px;border-radius:3px;border:1px solid transparent;flex:1;line-height:1.3;cursor:text;min-width:20px;}
.comp-name:focus{outline:none;border-color:var(--blue);background:var(--bg2);}
.comp-act-btn{width:22px;height:22px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;flex-shrink:0;}
.comp-act-btn:active{opacity:.7;}
.add-comp-btn{font-size:10px;color:var(--text3);cursor:pointer;padding:1px 4px;border-radius:3px;display:inline-flex;align-items:center;gap:2px;margin-top:2px;}
.del-comp-btn{font-size:11px;color:var(--text3);cursor:pointer;flex-shrink:0;padding:2px;}
.del-comp-btn:active{color:#f44336;}
.day-cell{width:120px;min-width:120px;max-width:120px;padding:3px;vertical-align:top;cursor:pointer;}
.day-cell.slim{width:28px;min-width:28px;max-width:28px;padding:2px 1px;}
.day-cell.wknd{background:var(--bg3);}.day-cell.ferie{background:#FFE8E8;}
.day-cell.today-col{background:#FFF3CD;border-left:2px solid #E8820C;border-right:2px solid #E8820C;}
.day-cell:active{background:#e3f0fd!important;}
.cell-inner{display:flex;flex-direction:column;gap:2px;min-height:74px;}
.cell-chantier{flex:0 0 33px;border-radius:5px;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;padding:3px 5px;line-height:1.3;}
.cell-tache{flex:1;min-height:28px;border-radius:5px;font-size:10px;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;padding:3px 5px;line-height:1.3;border:.5px solid transparent;}
.cell-chantier.slim-cell{font-size:0;border-radius:3px;}.cell-tache.slim-cell{font-size:0;}

/* POPUPS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;}
.overlay.open{display:block;}
.popup{display:none;position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--bg);border-radius:14px;padding:18px;z-index:200;width:calc(100vw - 32px);max-width:320px;box-shadow:var(--shadow);}
.popup.open{display:block;}
.popup h3{font-size:14px;font-weight:600;margin-bottom:14px;}
.popup label{font-size:11px;color:var(--text2);display:block;margin-bottom:4px;}
.popup input[type=text]{width:100%;font-size:13px;padding:8px 10px;border-radius:var(--rs);border:.5px solid var(--border);background:var(--bg2);color:var(--text);margin-bottom:12px;}
.popup input[type=text]:focus{outline:none;border-color:var(--blue);}
.pop-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.pop-btns button{font-size:12px;padding:7px 14px;border-radius:var(--rs);border:.5px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;}
.pop-btns .ok{background:var(--blue);color:#fff;border-color:var(--blue);}
.pop-btns .del{color:#f44336;border-color:#f44336;}
.cp-btns{display:flex;gap:6px;margin-bottom:10px;}
.cp-btn{flex:1;font-size:11px;padding:7px;border-radius:6px;border:.5px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:background .2s;}
.act-popup{display:none;position:fixed;background:var(--bg);border-radius:14px;padding:8px;z-index:300;width:200px;box-shadow:var(--shadow);border:.5px solid var(--border);}
.act-popup.open{display:block;}
.act-opt{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:var(--rs);cursor:pointer;font-size:12px;color:var(--text);}
.act-opt:active{background:var(--bg2);}
.act-dot{width:14px;height:14px;border-radius:3px;flex-shrink:0;}
.ctx-menu{display:none;position:fixed;background:var(--bg);border:.5px solid var(--border);border-radius:10px;padding:5px;z-index:350;min-width:160px;box-shadow:var(--shadow);}
.ctx-menu.open{display:block;}
.ctx-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--text);}
.ctx-item:hover{background:var(--bg2);}
.ctx-item.disabled{color:var(--text3);cursor:default;}.ctx-item.disabled:hover{background:none;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1><i class="ti ti-calendar-week" style="font-size:17px;vertical-align:-2px;margin-right:5px"></i>Planning Jehanno</h1>
    <div class="sync-badge"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Connexion…</span></div>
  </div>
  <div class="toolbar">
    <button class="btn" onclick="goToday()"><i class="ti ti-calendar-event"></i> Aujourd'hui</button>
    <div class="sep"></div>
    <button class="btn on" id="btn-15" onclick="setRange(15)">15 j</button>
    <button class="btn" id="btn-30" onclick="setRange(30)">30 j</button>
    <button class="btn" id="btn-panel-days" onclick="togglePanel('days')"><i class="ti ti-clock"></i></button>
    <div class="sep"></div>
    <button class="nav-btn" onclick="shiftDays(-1)" title="Reculer 1 jour"><i class="ti ti-chevron-left"></i></button>

    <button class="nav-btn" onclick="shiftDays(1)" title="Avancer 1 jour"><i class="ti ti-chevron-right"></i></button>
    <button class="btn" id="btn-panel-cal" onclick="togglePanel('cal')"><i class="ti ti-calendar"></i></button>
  </div>
</header>

<div class="panel" id="panel">
  <div id="sec-cal" class="cal-grid-wrap">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <button class="nav-btn" onclick="calNavMonth(-1)" style="width:26px;height:26px"><i class="ti ti-chevron-left"></i></button>
      <span id="cal-panel-lbl" style="font-size:12px;font-weight:600;flex:1;text-align:center;"></span>
      <button class="nav-btn" onclick="calNavMonth(1)" style="width:26px;height:26px"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div class="cal-days-header" id="cal-days-header"></div>
    <div class="cal-days" id="cal-days"></div>
  </div>
  <div id="sec-days" class="days-picker" style="display:none">
    <label><i class="ti ti-calendar-stats" style="font-size:13px;margin-right:3px"></i>Nombre de jours affichés</label>
    <div class="days-presets">
      <button id="dp-7" onclick="setRange(7)">7 j</button>
      <button id="dp-10" onclick="setRange(10)">10 j</button>
      <button id="dp-15" onclick="setRange(15)">15 j</button>
      <button id="dp-21" onclick="setRange(21)">21 j</button>
      <button id="dp-30" onclick="setRange(30)">30 j</button>
      <button id="dp-45" onclick="setRange(45)">45 j</button>
      <button id="dp-60" onclick="setRange(60)">60 j</button>
    </div>
    <div class="days-custom">
      <input type="number" id="custom-days" min="5" max="90" placeholder="Ex: 20">
      <span style="font-size:11px;color:var(--text2)">jours</span>
      <button class="btn" onclick="applyCustomDays()" style="height:28px;font-size:11px">OK</button>
    </div>
    <div style="font-size:10px;color:var(--text3);margin-top:4px">WE et fériés en colonnes étroites.</div>
  </div>
</div>

<!-- FILTRES + PAR POLE + EQUIPE sur 1 ligne -->
<div class="filters-bar">
  <span class="filter-label">Pôle :</span>
  <div id="act-filters" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex:1"></div>
  <div style="display:flex;gap:6px;flex-shrink:0">
    <button class="btn" id="btn-sort" onclick="toggleSort()"><i class="ti ti-arrows-sort"></i> Par pôle</button>
    <button class="btn" onclick="addTeam()"><i class="ti ti-plus"></i> Équipe</button>
  </div>
</div>

<div id="gantt-wrap"><table id="gantt"></table></div>

<div class="ctx-menu" id="ctx-menu">
  <div class="ctx-item" id="ctx-copy" onclick="ctxCopy()"><i class="ti ti-copy" style="font-size:14px"></i> Copier</div>
  <div class="ctx-item" id="ctx-paste" onclick="ctxPaste()"><i class="ti ti-clipboard" style="font-size:14px"></i> Coller ici</div>
  <div class="ctx-item" id="ctx-edit" onclick="ctxEdit()"><i class="ti ti-edit" style="font-size:14px"></i> Modifier</div>
  <div class="ctx-item" id="ctx-clear" onclick="ctxClear()" style="color:#f44336"><i class="ti ti-trash" style="font-size:14px"></i> Effacer</div>
</div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>
<div class="popup" id="cell-popup">
  <h3 id="cell-popup-title">Saisie chantier</h3>
  <label>Chantier</label>
  <input type="text" id="inp-chantier" placeholder="Nom du chantier…" maxlength="30">
  <label>Tâche / descriptif</label>
  <input type="text" id="inp-tache" placeholder="Ex : pose charpente…" maxlength="50">
  <div class="cp-btns">
    <button class="cp-btn" id="pop-copy-btn" onclick="popCopy()"><i class="ti ti-copy" style="font-size:13px"></i> Copier</button>
    <button class="cp-btn" id="pop-paste-btn" onclick="popPaste()"><i class="ti ti-clipboard" style="font-size:13px"></i> Coller</button>
  </div>
  <div class="pop-btns">
    <button class="del" onclick="popDelete()"><i class="ti ti-trash"></i> Effacer</button>
    <button onclick="closeAll()">Annuler</button>
    <button class="ok" onclick="popOk()">OK</button>
  </div>
</div>
<div class="act-popup" id="act-popup"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }                  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
  apiKey:"AIzaSyASl9qnu-poSZqp_9eUoDK0YbbjVYAnnz0",
  authDomain:"oj-chantier-7ed1d.firebaseapp.com",
  databaseURL:"https://oj-chantier-7ed1d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"oj-chantier-7ed1d",
  storageBucket:"oj-chantier-7ed1d.firebasestorage.app",
  messagingSenderId:"212267939056",
  appId:"1:212267939056:web:bf470ad83a6185671bfe35"
};
const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const BASE="planning/v1",TEAMS_REF=BASE+"/teams",CELLS_REF=BASE+"/cells",RANGE_REF=BASE+"/range";

// ── FÉRIÉS ───────────────────────────────────────────────────
function getFeries(yr){
  const f=new Set(),add=(m,d)=>f.add(yr+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0'));
  add(1,1);add(5,1);add(5,8);add(7,14);add(8,15);add(11,1);add(11,11);add(12,25);
  const a=yr%19,b=Math.floor(yr/100),c=yr%100,d2=Math.floor(b/4),e=b%4,f2=Math.floor((b+8)/25),g=Math.floor((b-f2+1)/3);
  const h=(19*a+b-d2-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m2=Math.floor((a+11*h+22*l)/451);
  const mo=Math.floor((h+l-7*m2+114)/31),da=((h+l-7*m2+114)%31)+1;
  const paques=new Date(yr,mo-1,da);
  [1,39,50].forEach(off=>{const x=new Date(paques);x.setDate(x.getDate()+off);add(x.getMonth()+1,x.getDate());});
  return f;
}
const FC={};
function isFerie(date){const y=date.getFullYear();if(!FC[y])FC[y]=getFeries(y);return FC[y].has(date.toISOString().split('T')[0]);}

// ── ACTIVITÉS ────────────────────────────────────────────────
const ACT=[
  {id:'pose',      label:'Pose chantier',icon:'ti-building-factory-2',bg:'#B5D4F4',text:'#0C447C',tBg:'#E6F1FB'},
  {id:'charpente', label:'Charpente',    icon:'ti-home-2',            bg:'#C0DD97',text:'#27500A',tBg:'#EAF3DE'},
  {id:'atelier',   label:'Atelier',      icon:'ti-tools',             bg:'#FAC775',text:'#633806',tBg:'#FAEEDA'},
  {id:'autre',     label:'Autre',        icon:'ti-dots',              bg:'#D3D1C7',text:'#444441',tBg:'#F1EFE8'},
];
const actById=id=>ACT.find(a=>a.id===id)||ACT[3];
const POLE_ORDER=['pose','charpente','atelier','autre'];

let teams=[
  {name:'Équipe Laurent',compagnons:[{name:'Laurent',actId:'pose'},{name:'Le Dain',actId:'pose'}]},
  {name:'Équipe Mathieu',compagnons:[{name:'Mathieu',actId:'charpente'},{name:'Hugo',actId:'charpente'}]},
  {name:'Équipe Denis',  compagnons:[{name:'Denis',actId:'atelier'}]},
  {name:'Équipe Pearce', compagnons:[{name:'Pearce',actId:'pose'},{name:'Jérémy',actId:'pose'}]},
  {name:'Équipe Nicolas',compagnons:[{name:'Nicolas',actId:'charpente'}]},
  {name:'Équipe Sylvain',compagnons:[{name:'Sylvain',actId:'atelier'},{name:'Ronan',actId:'atelier'}]},
  {name:'Équipe Yann',   compagnons:[{name:'Yann',actId:'pose'}]},
  {name:'Équipe Pierre', compagnons:[{name:'Pierre',actId:'charpente'}]},
];
let cells={},startDate=new Date(),nbDays=15;
let activeFilters=new Set(),sortByPole=false,popCell=null;
let calViewDate=new Date(),openPanel=null;
let clipboard=null,ctxCell=null,longPressTimer=null;
startDate.setHours(0,0,0,0);

const key=(t,d)=>t+'_'+d;
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const todayMs=()=>{let d=new Date();d.setHours(0,0,0,0);return d.getTime();};
function dayDate(d){let x=new Date(startDate);x.setDate(x.getDate()+d);x.setHours(0,0,0,0);return x;}
const isWknd=d=>{const x=dayDate(d);return x.getDay()===0||x.getDay()===6;};
const isFerOff=d=>isFerie(dayDate(d));
const isSlim=d=>isWknd(d)||isFerOff(d);
const isToday=d=>dayDate(d).getTime()===todayMs();
function fmtDate(d){const x=dayDate(d),slim=isSlim(d);return (slim?['D','L','M','M','J','V','S']:['Di','Lu','Ma','Me','Je','Ve','Sa'])[x.getDay()]+'<br>'+x.getDate();}
function getWeekNum(date){const d=new Date(date);d.setHours(0,0,0,0);d.setDate(d.getDate()+3-(d.getDay()+6)%7);const w=new Date(d.getFullYear(),0,4);return 1+Math.round(((d-w)/86400000-3+(w.getDay()+6)%7)/7);}
const teamDomAct=t=>{const c={};t.compagnons.forEach(x=>{c[x.actId]=(c[x.actId]||0)+1;});return Object.entries(c).sort((a,b)=>b[1]-a[1])[0]?.[0]||'autre';};
function monthHeaders(){let res=[],cur=null;for(let i=0;i<nbDays;i++){const x=dayDate(i),m=x.toLocaleString('fr-FR',{month:'long',year:'numeric'});if(!cur||cur.name!==m){cur={name:m,count:1};res.push(cur);}else cur.count++;}return res;}
function weekHeaders(){let res=[],cur=null;for(let i=0;i<nbDays;i++){const wn=getWeekNum(dayDate(i));if(!cur||cur.wn!==wn){cur={wn,count:1};res.push(cur);}else cur.count++;}return res;}
function updateMonthLbl(){document.getElementById('cal-month-lbl').textContent=startDate.toLocaleString('fr-FR',{month:'long',year:'numeric'}).replace(/^\w/,c=>c.toUpperCase());}

// ── SYNC ─────────────────────────────────────────────────────
function setSS(s){document.getElementById('sync-dot').className='sync-dot '+s;document.getElementById('sync-label').textContent=s==='ok'?'Synchronisé':s==='syncing'?'Sync…':'Hors ligne';}
async function saveTeams(){setSS('syncing');try{await set(ref(db,TEAMS_REF),JSON.parse(JSON.stringify(teams)));setSS('ok');}catch(e){setSS('err');toast('Erreur sauvegarde !');}}
async function saveCells(){setSS('syncing');try{await set(ref(db,CELLS_REF),Object.keys(cells).length?cells:null);setSS('ok');}catch(e){setSS('err');toast('Erreur sauvegarde !');}}
async function saveRange(){try{await set(ref(db,RANGE_REF),{start:startDate.toISOString().split('T')[0],days:nbDays});}catch(e){}}

onValue(ref(db,TEAMS_REF),snap=>{const d=snap.val();if(d&&Array.isArray(d)){teams=d;render();buildFilters();}setSS('ok');},()=>setSS('err'));
onValue(ref(db,CELLS_REF),snap=>{cells=snap.val()||{};render();});
onValue(ref(db,RANGE_REF),snap=>{const d=snap.val();if(d){startDate=new Date(d.start+'T00:00:00');nbDays=d.days;updateRangeBtns();updateMonthLbl();renderCal();render();}});

// ── RANGE ─────────────────────────────────────────────────────
function updateRangeBtns(){
  [7,10,15,21,30,45,60].forEach(n=>{const b=document.getElementById('dp-'+n);if(b)b.classList.toggle('on',nbDays===n);});
  document.getElementById('btn-15').classList.toggle('on',nbDays===15);
  document.getElementById('btn-30').classList.toggle('on',nbDays===30);
}
window.setRange=n=>{nbDays=n;updateRangeBtns();updateMonthLbl();renderCal();render();saveRange();};
window.applyCustomDays=()=>{const v=parseInt(document.getElementById('custom-days').value);if(v>=5&&v<=90)setRange(v);else toast('Entre 5 et 90 jours');};
window.shiftDays=n=>{startDate.setDate(startDate.getDate()+n);updateMonthLbl();renderCal();render();saveRange();};
window.goToday=()=>{
  const t=new Date();t.setHours(0,0,0,0);let dow=t.getDay();if(dow===0)dow=7;t.setDate(t.getDate()-(dow-1));
  startDate=t;calViewDate=new Date(t);updateRangeBtns();updateMonthLbl();renderCal();render();saveRange();
  setTimeout(()=>{const el=document.querySelector('.today-col');if(el)el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});},100);
};
window.toggleSort=()=>{sortByPole=!sortByPole;document.getElementById('btn-sort').classList.toggle('on',sortByPole);render();};

// ── PANEL ─────────────────────────────────────────────────────
window.togglePanel=which=>{
  const panel=document.getElementById('panel');
  if(openPanel===which){panel.classList.remove('open');openPanel=null;document.getElementById('btn-panel-cal').classList.remove('on');document.getElementById('btn-panel-days').classList.remove('on');return;}
  openPanel=which;panel.classList.add('open');
  document.getElementById('sec-cal').style.display=which==='cal'?'block':'none';
  document.getElementById('sec-days').style.display=which==='days'?'flex':'none';
  document.getElementById('btn-panel-cal').classList.toggle('on',which==='cal');
  document.getElementById('btn-panel-days').classList.toggle('on',which==='days');
  if(which==='cal')renderCal();
};
window.calNavMonth=dir=>{
  calViewDate=new Date(calViewDate.getFullYear(),calViewDate.getMonth()+dir,1);
  if(openPanel!=='cal'){openPanel='cal';document.getElementById('panel').classList.add('open');document.getElementById('sec-cal').style.display='block';document.getElementById('sec-days').style.display='none';document.getElementById('btn-panel-cal').classList.add('on');document.getElementById('btn-panel-days').classList.remove('on');}
  renderCal();
};

// ── CALENDRIER ────────────────────────────────────────────────
function renderCal(){
  const yr=calViewDate.getFullYear(),mo=calViewDate.getMonth();
  const lbl=new Date(yr,mo,1).toLocaleString('fr-FR',{month:'long',year:'numeric'}).replace(/^\w/,c=>c.toUpperCase());
  const pl=document.getElementById('cal-panel-lbl');if(pl)pl.textContent=lbl;
  document.getElementById('cal-days-header').innerHTML=['Lu','Ma','Me','Je','Ve','Sa','Di'].map(d=>`<div>${d}</div>`).join('');
  const grid=document.getElementById('cal-days');grid.innerHTML='';
  const firstDay=new Date(yr,mo,1);let sDow=firstDay.getDay()||7;
  const lastDay=new Date(yr,mo+1,0).getDate();
  const rS=startDate.getTime(),rE=new Date(startDate);rE.setDate(rE.getDate()+nbDays-1);rE.setHours(23,59,59);
  const tMs=todayMs(),prevLast=new Date(yr,mo,0).getDate();
  for(let i=sDow-1;i>0;i--){const d=new Date(yr,mo-1,prevLast-i+1);d.setHours(0,0,0,0);grid.appendChild(calEl(d,true,rS,rE.getTime(),tMs));}
  for(let i=1;i<=lastDay;i++){const d=new Date(yr,mo,i);d.setHours(0,0,0,0);grid.appendChild(calEl(d,false,rS,rE.getTime(),tMs));}
  const tot=(sDow-1)+lastDay,nx=tot%7===0?0:7-(tot%7);
  for(let i=1;i<=nx;i++){const d=new Date(yr,mo+1,i);d.setHours(0,0,0,0);grid.appendChild(calEl(d,true,rS,rE.getTime(),tMs));}
}
function calEl(date,other,rS,rE,tMs){
  const el=document.createElement('div'),dMs=date.getTime(),dow=date.getDay(),isWk=dow===0||dow===6,isFer=isFerie(date);
  let cls='cal-day';
  if(other)cls+=' other-month';if(dMs===tMs)cls+=' is-today';if(isWk)cls+=' wknd-day';if(isFer&&!other)cls+=' ferie-day';
  if(dMs>=rS&&dMs<=rE)cls+=isWk?' wknd-day in-range':' in-range';
  if(dMs===rS)cls+=' range-start';if(dMs===rE)cls+=' range-end';
  el.className=cls;el.textContent=date.getDate();
  el.onclick=()=>{startDate=new Date(date);startDate.setHours(0,0,0,0);updateMonthLbl();renderCal();render();saveRange();};
  return el;
}

// ── FILTRES ───────────────────────────────────────────────────
function buildFilters(){
  const el=document.getElementById('act-filters');el.innerHTML='';
  const allOn=activeFilters.size===0;
  const allChip=document.createElement('div');
  allChip.className='act-chip'+(allOn?'':' off');
  allChip.style.cssText='background:#F1EFE8;color:#444441;border-color:#D3D1C7';
  allChip.innerHTML='<i class="ti ti-layout-grid"></i> Tous';
  allChip.onclick=()=>{activeFilters.clear();buildFilters();render();};
  el.appendChild(allChip);
  ACT.forEach(a=>{
    const on=activeFilters.has(a.id);
    const chip=document.createElement('div');
    chip.className='act-chip'+(activeFilters.size>0&&!on?' off':'');
    chip.style.cssText=`background:${a.bg};color:${a.text};border-color:${a.bg}`;
    chip.innerHTML=`<i class="ti ${a.icon}"></i> ${a.label}`;
    chip.onclick=()=>{if(on)activeFilters.delete(a.id);else activeFilters.add(a.id);if(activeFilters.size===ACT.length)activeFilters.clear();buildFilters();render();};
    el.appendChild(chip);
  });
  if(activeFilters.size>1){const h=document.createElement('span');h.style.cssText='font-size:10px;color:var(--text3)';h.textContent=`(${activeFilters.size} pôles)`;el.appendChild(h);}
}

// ── COPIER/COLLER ────────────────────────────────────────────
function openCtxMenu(e,ti,d){
  e.preventDefault();ctxCell={ti,d};
  const c=cells[key(ti,d)];
  document.getElementById('ctx-copy').className='ctx-item'+(c?'':' disabled');
  document.getElementById('ctx-paste').className='ctx-item'+(clipboard?'':' disabled');
  document.getElementById('ctx-clear').className='ctx-item'+(c?'':' disabled');
  const menu=document.getElementById('ctx-menu');menu.classList.add('open');
  let x=e.clientX||0,y=e.clientY||0;
  if(x+170>window.innerWidth)x=window.innerWidth-175;
  if(y+160>window.innerHeight)y=window.innerHeight-165;
  menu.style.left=x+'px';menu.style.top=y+'px';
}
window.ctxCopy=()=>{if(!ctxCell)return;const c=cells[key(ctxCell.ti,ctxCell.d)];if(!c){toast('Case vide');return;}clipboard={...c};closeCtxMenu();toast('📋 Copié : '+c.chantier);};
window.ctxPaste=()=>{if(!ctxCell||!clipboard)return;cells[key(ctxCell.ti,ctxCell.d)]={...clipboard};closeCtxMenu();render();saveCells();toast('✅ Collé : '+clipboard.chantier);};
window.ctxEdit=()=>{if(!ctxCell)return;closeCtxMenu();openCellPopDirect(ctxCell.ti,ctxCell.d);};
window.ctxClear=()=>{if(!ctxCell)return;delete cells[key(ctxCell.ti,ctxCell.d)];closeCtxMenu();render();saveCells();};
function closeCtxMenu(){document.getElementById('ctx-menu').classList.remove('open');ctxCell=null;}
document.addEventListener('click',e=>{if(!e.target.closest('#ctx-menu'))closeCtxMenu();});

// ── RENDER ────────────────────────────────────────────────────
function render(){
  const g=document.getElementById('gantt');
  const mh=monthHeaders(),wh=weekHeaders();
  // Ligne mois
  let h='<thead><tr><th class="team-col" rowspan="3" style="vertical-align:bottom;padding-bottom:8px">Équipes</th>';
  mh.forEach(m=>{h+=`<th colspan="${m.count}" class="month-hd">${m.name}</th>`;});
  h+='</tr>';
  // Ligne semaines
  h+='<tr>';
  wh.forEach(w=>{h+=`<th colspan="${w.count}" style="background:var(--bg2);color:var(--text3);font-size:10px;padding:3px 2px;text-align:center;">S${w.wn}</th>`;});
  h+='</tr>';
  // Ligne jours
  h+='<tr>';
  for(let d=0;d<nbDays;d++){
    const slim=isSlim(d),fer=isFerOff(d),wk=isWknd(d),tod=isToday(d);
    let cls=(slim?'day-slim':'day-normal')+(fer?' ferie':wk?' wknd':'')+(tod?' today-hd':'');
    h+=`<th class="${cls}"${tod?' style="font-weight:700"':''}>${fmtDate(d)}</th>`;
  }
  h+='</tr></thead><tbody>';

  let indexed=teams.map((team,ti)=>({team,ti}));
  let visible=indexed.filter(({team})=>activeFilters.size===0||activeFilters.has(teamDomAct(team)));
  if(sortByPole)visible=[...visible].sort((a,b)=>POLE_ORDER.indexOf(teamDomAct(a.team))-POLE_ORDER.indexOf(teamDomAct(b.team)));

  let lastPole=null;
  visible.forEach(({team,ti})=>{
    const domActId=teamDomAct(team),domAct=actById(domActId);
    if(sortByPole&&domActId!==lastPole){
      lastPole=domActId;
      h+=`<tr><td colspan="${nbDays+1}" style="padding:5px 10px;background:${domAct.bg};color:${domAct.text};font-size:11px;font-weight:600;"><i class="ti ${domAct.icon}" style="font-size:13px;vertical-align:-2px;margin-right:5px"></i>${domAct.label.toUpperCase()}</td></tr>`;
    }
    h+=buildTeamRow(team,ti,domAct);
  });
  if(visible.length===0)h+=`<tr><td colspan="${nbDays+1}" style="text-align:center;padding:30px;color:var(--text3);">Aucune équipe pour ces pôles</td></tr>`;
  h+='</tbody>';
  g.innerHTML=h;

  // Events clic droit + long press
  document.querySelectorAll('.day-cell').forEach(td=>{
    const ti=parseInt(td.dataset.ti),d=parseInt(td.dataset.d);
    td.addEventListener('contextmenu',e=>openCtxMenu(e,ti,d));
    td.addEventListener('touchstart',e=>{longPressTimer=setTimeout(()=>{openCtxMenu({preventDefault:()=>{},clientX:e.touches[0].clientX,clientY:e.touches[0].clientY},ti,d);},600);},{passive:true});
    td.addEventListener('touchend',()=>clearTimeout(longPressTimer));
    td.addEventListener('touchmove',()=>clearTimeout(longPressTimer));
  });
}

function buildTeamRow(team,ti,domAct){
  let compHtml='';
  team.compagnons.forEach((c,ci)=>{
    const act=actById(c.actId);
    compHtml+=`<div class="compagnon-row">
      <button class="comp-act-btn" style="background:${act.bg}" onclick="openActPop(event,${ti},${ci})"><i class="ti ${act.icon}" style="color:${act.text};font-size:12px"></i></button>
      <span class="comp-name" contenteditable="true" data-ti="${ti}" data-ci="${ci}" onblur="renameComp(this)" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">${esc(c.name)}</span>
      <span class="del-comp-btn" onclick="delComp(${ti},${ci})"><i class="ti ti-x" style="font-size:10px"></i></span>
    </div>`;
  });
  compHtml+=`<span class="add-comp-btn" onclick="addComp(${ti})"><i class="ti ti-plus" style="font-size:10px"></i> compagnon</span>`;
  let row=`<tr><td class="team-cell" style="border-left:3px solid ${domAct.bg}">${compHtml}</td>`;
  for(let d=0;d<nbDays;d++){
    const k=key(ti,d),c=cells[k],slim=isSlim(d),fer=isFerOff(d),wk=isWknd(d),tod=isToday(d);
    let cls='day-cell'+(slim?' slim':'')+(fer?' ferie':wk?' wknd':'')+(tod?' today-col':'');
    let chH='<div class="cell-chantier"></div>',taH='<div class="cell-tache"></div>';
    if(c){
      if(slim){chH=`<div class="cell-chantier slim-cell" style="background:${domAct.bg};opacity:.7"></div>`;taH=`<div class="cell-tache slim-cell" style="background:${domAct.tBg};opacity:.7;border-color:${domAct.bg}"></div>`;}
      else{chH=`<div class="cell-chantier" style="background:${domAct.bg};color:${domAct.text}">${esc(c.chantier)}</div>`;taH=`<div class="cell-tache" style="background:${domAct.tBg};color:${domAct.text};border-color:${domAct.bg}">${esc(c.tache||'')}</div>`;}
    }
    row+=`<td class="${cls}" data-key="${k}" data-ti="${ti}" data-d="${d}" onclick="openCellPop(event,${ti},${d})"><div class="cell-inner${slim?' slim':''}">${chH}${taH}</div></td>`;
  }
  return row+'</tr>';
}

// ── CELL POPUP ────────────────────────────────────────────────
function openCellPopDirect(ti,d){
  popCell={ti,d};
  const c=cells[key(ti,d)]||{};
  document.getElementById('cell-popup-title').textContent=teams[ti]?.name||'Chantier';
  document.getElementById('inp-chantier').value=c.chantier||'';
  document.getElementById('inp-tache').value=c.tache||'';
  const cp=document.getElementById('pop-copy-btn'),pp=document.getElementById('pop-paste-btn');
  if(cp)cp.style.opacity=(c.chantier||c.tache)?'1':'0.4';
  if(pp)pp.style.opacity=clipboard?'1':'0.4';
  document.getElementById('cell-popup').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('inp-chantier').focus(),100);
}
window.openCellPop=(e,ti,d)=>{e.stopPropagation();openCellPopDirect(ti,d);};
window.popOk=()=>{
  if(!popCell)return;
  const ch=document.getElementById('inp-chantier').value.trim(),ta=document.getElementById('inp-tache').value.trim(),k=key(popCell.ti,popCell.d);
  if(ch||ta)cells[k]={chantier:ch,tache:ta};else delete cells[k];
  closeAll();render();saveCells();
};
window.popDelete=()=>{if(!popCell)return;delete cells[key(popCell.ti,popCell.d)];closeAll();render();saveCells();};
window.popCopy=()=>{
  if(!popCell)return;
  const ch=document.getElementById('inp-chantier').value.trim(),ta=document.getElementById('inp-tache').value.trim();
  if(!ch&&!ta){toast('Rien à copier');return;}
  clipboard={chantier:ch,tache:ta};
  const btn=document.getElementById('pop-copy-btn');
  btn.style.background='#C0DD97';btn.style.color='#27500A';btn.innerHTML='<i class="ti ti-check" style="font-size:13px"></i> Copié !';
  setTimeout(()=>{btn.style.background='';btn.style.color='';btn.innerHTML='<i class="ti ti-copy" style="font-size:13px"></i> Copier';},1500);
};
window.popPaste=()=>{
  if(!popCell){toast("Ouvre une case d'abord");return;}
  if(!clipboard){toast('Presse-papier vide');return;}
  document.getElementById('inp-chantier').value=clipboard.chantier||'';
  document.getElementById('inp-tache').value=clipboard.tache||'';
  const btn=document.getElementById('pop-paste-btn');
  btn.style.background='#B5D4F4';btn.style.color='#0C447C';btn.innerHTML='<i class="ti ti-check" style="font-size:13px"></i> Collé !';
  setTimeout(()=>{btn.style.background='';btn.style.color='';btn.innerHTML='<i class="ti ti-clipboard" style="font-size:13px"></i> Coller';},1500);
};

// ── COMPAGNONS ────────────────────────────────────────────────
window.renameComp=el=>{const ti=parseInt(el.dataset.ti),ci=parseInt(el.dataset.ci),v=el.innerText.trim();if(v)teams[ti].compagnons[ci].name=v;else el.innerText=teams[ti].compagnons[ci].name;saveTeams();};
window.addComp=ti=>{teams[ti].compagnons.push({name:'Nouveau',actId:'pose'});render();saveTeams();};
window.delComp=(ti,ci)=>{
  teams[ti].compagnons.splice(ci,1);
  if(teams[ti].compagnons.length===0){Object.keys(cells).filter(k=>k.startsWith(ti+'_')).forEach(k=>delete cells[k]);teams.splice(ti,1);saveCells();toast('Équipe supprimée');}
  render();buildFilters();saveTeams();
};
window.addTeam=()=>{teams.push({name:'Nouvelle équipe',compagnons:[{name:'Compagnon',actId:'pose'}]});render();buildFilters();saveTeams();};

// ── ACT POPUP ─────────────────────────────────────────────────
window.openActPop=(e,ti,ci)=>{
  e.stopPropagation();
  const pop=document.getElementById('act-popup');pop.innerHTML='';
  ACT.forEach(a=>{
    const opt=document.createElement('div');opt.className='act-opt';
    opt.innerHTML=`<div class="act-dot" style="background:${a.bg}"></div><i class="ti ${a.icon}" style="font-size:14px;color:${a.text}"></i><span>${a.label}</span>`;
    opt.onclick=()=>{teams[ti].compagnons[ci].actId=a.id;closeAll();render();buildFilters();saveTeams();};
    pop.appendChild(opt);
  });
  pop.classList.add('open');document.getElementById('overlay').classList.add('open');
  const rect=e.target.closest('.comp-act-btn').getBoundingClientRect();
  let x=rect.right+6,y=rect.top;
  if(x+210>window.innerWidth)x=rect.left-210;if(y+200>window.innerHeight)y=window.innerHeight-210;
  pop.style.left=x+'px';pop.style.top=y+'px';
};

window.closeAll=()=>{
  document.getElementById('cell-popup').classList.remove('open');
  document.getElementById('act-popup').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  closeCtxMenu();popCell=null;
};
document.getElementById('inp-tache').addEventListener('keydown',e=>{if(e.key==='Enter')popOk();});
document.getElementById('inp-chantier').addEventListener('keydown',e=>{if(e.key==='Tab'){e.preventDefault();document.getElementById('inp-tache').focus();}});

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// ── INIT ──────────────────────────────────────────────────────
const t0=new Date();t0.setHours(0,0,0,0);let dow0=t0.getDay();if(dow0===0)dow0=7;t0.setDate(t0.getDate()-(dow0-1));
startDate=t0;calViewDate=new Date(t0);
setSS('syncing');buildFilters();updateMonthLbl();renderCal();render();
</script>
</body>
