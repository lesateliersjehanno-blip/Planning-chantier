<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Planning Chantier — Jehanno</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#fff;--bg2:#f5f5f5;--bg3:#ebebeb;--border:#e0e0e0;
  --text:#1a1a1a;--text2:#666;--text3:#999;--blue:#378ADD;
  --rs:6px;--shadow:0 2px 16px rgba(0,0,0,.12);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--border:#3a3a3c;
  --text:#f0f0f0;--text2:#aaa;--text3:#666;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;}

/* ── HEADER ─────────────────────────────────────────────── */
header{background:var(--bg);border-bottom:.5px solid var(--border);padding:8px 12px;position:sticky;top:0;z-index:50;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.header-top h1{font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px;}
.sync-badge{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;transition:background .3s;}
.sync-dot.ok{background:#4caf50;}.sync-dot.syncing{background:#ff9800;animation:pulse 1s infinite;}.sync-dot.err{background:#f44336;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.toolbar{display:flex;align-items:center;gap:5px;flex-wrap:nowrap;overflow-x:auto;}
.btn{font-size:12px;padding:0 10px;border-radius:var(--rs);border:.5px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;height:30px;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;flex-shrink:0;}
.btn:active{background:var(--bg3);}.btn.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.nav-btn{width:30px;height:30px;border-radius:var(--rs);border:.5px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nav-btn:active{background:var(--bg3);}
.sep{width:.5px;height:20px;background:var(--border);margin:0 2px;flex-shrink:0;}

/* ── PANEL ────────────────────────────────────────────────── */
.panel{display:none;padding:10px 12px 12px;background:var(--bg);border-bottom:.5px solid var(--border);}
.panel.open{display:flex;gap:16px;flex-wrap:wrap;}
.cal-wrap{min-width:200px;}
.cal-nav{display:flex;align-items:center;gap:6px;margin-bottom:7px;}
.cal-nav span{flex:1;text-align:center;font-size:12px;font-weight:600;}
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:9px;color:var(--text3);margin-bottom:3px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cd{height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;color:var(--text);position:relative;}
.cd:hover{background:var(--bg2);}.cd.om{color:var(--text3);}.cd.td{font-weight:700;color:var(--blue);}
.cd.ir{background:#EAF3FD;}.cd.rs{background:var(--blue);color:#fff;border-radius:4px 0 0 4px;}
.cd.re{background:var(--blue);color:#fff;border-radius:0 4px 4px 0;}.cd.rs.re{border-radius:4px;}
.cd.wk{color:#bbb;}.cd.wk.ir{background:#ebebeb;}
.cd.fe::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:#f44336;}
.days-picker{display:flex;flex-direction:column;gap:7px;}
.days-picker label{font-size:11px;color:var(--text2);font-weight:500;}
.dp-presets{display:flex;gap:4px;flex-wrap:wrap;}
.dp-presets button{font-size:11px;padding:4px 9px;border-radius:var(--rs);border:.5px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;}
.dp-presets button.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.dp-custom{display:flex;align-items:center;gap:5px;}
.dp-custom input{width:55px;font-size:12px;padding:5px 7px;border-radius:var(--rs);border:.5px solid var(--border);background:var(--bg2);color:var(--text);}

/* ── GESTION POLES ────────────────────────────────────────── */
.poles-bar{display:flex;align-items:center;gap:6px;padding:6px 12px;border-bottom:.5px solid var(--border);background:var(--bg2);}
.pole-chip{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:16px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid transparent;white-space:nowrap;user-select:none;transition:opacity .15s;flex-shrink:0;}
.pole-chip.off{opacity:.28;filter:grayscale(.5);}
.pole-chip:active{transform:scale(.95);}
.poles-actions{display:flex;align-items:center;gap:5px;margin-left:auto;flex-shrink:0;}
#pole-chips{display:flex;gap:5px;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex:1;min-width:0;}
#pole-chips::-webkit-scrollbar{display:none;}

/* ── MOBILE : barre pôles masquée, header compact ───── */
@media(max-width:900px){
  .poles-bar{display:none!important;}
  header{padding:6px 8px;}
  .header-top h1{font-size:13px;}
  .toolbar{gap:3px;}
  .toolbar .btn{padding:0 7px;font-size:11px;height:28px;}
  .nav-btn{width:26px;height:26px;}
  #mlbl{min-width:60px!important;font-size:11px!important;}
  thead th.team-col{min-width:140px!important;width:140px!important;padding-left:6px!important;}
  .team-cell{min-width:140px!important;width:140px!important;max-width:140px!important;padding:4px 5px!important;}
  thead th.dn{width:64px!important;min-width:64px!important;max-width:64px!important;}
  .dc.dn{width:64px!important;min-width:64px!important;max-width:64px!important;}
  thead th.ds{width:20px!important;min-width:20px!important;max-width:20px!important;}
  .dc.ds{width:20px!important;min-width:20px!important;max-width:20px!important;}
  thead th.dw{width:46px!important;min-width:46px!important;max-width:46px!important;}
  .dc.dw{width:46px!important;min-width:46px!important;max-width:46px!important;}
  .cn{font-size:11px!important;}
  .cab{width:17px!important;height:17px!important;}
  .cc{font-size:9.5px!important;}
  .ct{font-size:8.5px!important;}
  .ci{min-height:54px!important;}
  .ci.ci-sav{min-height:115px!important;}
  .ct.ct-sav{min-height:55px!important;font-size:9px!important;}
  /* Sur mobile : header normal (scroll avec page), thead du tableau masqué (illisible une fois sticky cassé),
     remplacé par un en-tête dupliqué FIXE qui n'est pas un tableau (#mobile-hdr-wrap) */
  thead{display:none;}
  #mobile-hdr-wrap{display:block!important;position:sticky;top:0;z-index:40;background:var(--bg2);border-bottom:1px solid var(--border);overflow:hidden;}
}
@media(min-width:901px){#mobile-hdr-wrap{display:none!important;}#bpf{display:none!important;}}

/* En-tête mobile dupliqué : structure en flex, pas un tableau */
#mobile-hdr-wrap{position:sticky;}
.mh-team-fixed{position:absolute;left:0;top:0;width:140px;height:40px;display:flex;align-items:center;padding-left:6px;font-size:10px;font-weight:600;color:var(--text2);background:var(--bg2);z-index:2;border-right:.5px solid var(--border);}
#mobile-hdr-scroll{display:flex;will-change:transform;padding-left:140px;}
.mh-day{flex:0 0 64px;width:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;text-align:center;height:40px;border-right:.5px solid var(--border);}
.mh-day.slim{flex:0 0 20px;width:20px;font-size:8px;}
.mh-day.wk{flex:0 0 46px;width:46px;background:#b8b8bd;color:#333;}
.mh-day.fe{background:#FFE8E8;}
.mh-day.today{background:#E8820C;color:#fff;font-weight:700;}

/* ── GANTT ────────────────────────────────────────────────── */
#gantt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
@media(min-width:901px){#gantt-wrap{overflow-y:auto;max-height:calc(100vh - 140px);isolation:isolate;}}
table{border-collapse:collapse;min-width:max-content;}
th,td{border-right:.5px solid var(--border);border-bottom:.5px solid var(--border);}
thead th{background:var(--bg2);color:var(--text2);font-weight:500;font-size:11px;text-align:center;padding:4px 2px;white-space:nowrap;position:sticky;z-index:4;}
.tr-month th{top:0;}
.tr-week th{top:26px;}
thead th.week-cell{background:#e0e0e0!important;color:#888!important;font-size:9px!important;font-weight:400!important;padding:2px!important;}
@media(prefers-color-scheme:dark){thead th.week-cell{background:#3a3a3c!important;color:#999!important;}}
.tr-days th{top:44px;}
thead th.team-col{top:0!important;}
thead th.team-col{text-align:left;padding-left:8px;position:sticky;left:0;top:0;z-index:6;min-width:135px;width:135px;background:var(--bg2);}
thead th.month-hd{font-size:12px;font-weight:600;color:var(--text);background:var(--bg2);}
thead th.dn{width:110px;min-width:110px;}
thead th.ds{width:26px;min-width:26px;font-size:9px;padding:3px 1px;}
thead th.dw{width:72px;min-width:72px;}
thead th.wk{background:#b8b8bd!important;color:#333!important;}
thead th.fe{background:#FFE8E8!important;}
thead th.th{background:#E8820C!important;color:#fff!important;font-weight:700;}

.team-cell{position:sticky;left:0;background:var(--bg);z-index:2;width:135px;min-width:135px;max-width:135px;padding:5px 6px;vertical-align:top;border-left:3px solid transparent;}
.cr{display:flex;align-items:center;gap:3px;margin-bottom:1px;}
.cn{font-size:11px;font-weight:500;color:var(--text);padding:1px 3px;border-radius:3px;border:1px solid transparent;flex:1;line-height:1.3;cursor:text;min-width:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cn:focus{outline:none;border-color:var(--blue);background:var(--bg2);}
.cab{width:19px;height:19px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;flex-shrink:0;}
.cab:active{opacity:.7;}
.acb{font-size:10px;color:var(--text3);cursor:pointer;padding:1px 4px;border-radius:3px;display:inline-flex;align-items:center;gap:2px;margin-top:1px;}
.dcb{font-size:10px;color:var(--text3);cursor:pointer;flex-shrink:0;padding:2px;}
.dcb:active{color:#f44336;}

/* -- Poignee de deplacement d'equipe (appui long) -- */
.acb-wrap{position:relative;display:inline-flex;flex-shrink:0;}
.team-handle{position:absolute;top:100%;left:0;width:14px;height:11px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:9px;line-height:1;cursor:grab;-webkit-user-select:none;user-select:none;touch-action:none;border-radius:3px;z-index:3;}
.team-handle:active{background:var(--bg3);cursor:grabbing;color:var(--blue);}
tr.row-moving{outline:2px dashed var(--blue);outline-offset:-2px;}
tr.row-moving .team-cell{background:rgba(55,138,221,.1);}
.move-toolbar{display:none;position:fixed;left:50%;top:70px;transform:translateX(-50%);background:var(--blue);border:none;border-radius:22px;box-shadow:0 4px 20px rgba(55,138,221,.45);padding:6px 8px;gap:6px;z-index:600;align-items:center;}
.move-toolbar.open{display:flex;}
.move-toolbar .mt-label{font-size:11px;color:#fff;font-weight:600;padding:0 6px;white-space:nowrap;max-width:38vw;overflow:hidden;text-overflow:ellipsis;}
.move-toolbar button{width:34px;height:34px;border-radius:50%;border:none;background:rgba(255,255,255,.92);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0;}
.move-toolbar button:active{background:#fff;}
.move-toolbar button.done{background:#4caf50;color:#fff;}
.move-toolbar button:disabled{opacity:.35;cursor:default;}
@media print{.move-toolbar{display:none!important;}}

.dc{padding:2px;vertical-align:top;cursor:pointer;box-sizing:border-box;}
.dc.dn{width:110px;min-width:110px;max-width:110px;}
.dc.ds{width:26px;min-width:26px;max-width:26px;padding:1px;}
.dc.dw{width:72px;min-width:72px;max-width:72px;}
.dc.wk{background:#b8b8bd;}.dc.fe{background:#FFE8E8;}
.dc.tc{background:#FFF3CD;border-left:2px solid #E8820C;border-right:2px solid #E8820C;}
.ci.wknd-ci{align-items:center;justify-content:center;}
.wknd-disp{width:100%;display:flex;flex-direction:column;align-items:center;gap:1px;font-size:10px;font-weight:500;text-align:center;line-height:1.3;padding:5px 3px 4px;border-radius:5px;position:relative;}
.wknd-name{cursor:pointer;border-radius:3px;padding:0 3px;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wknd-name:active{background:rgba(255,255,255,.55);}
.wknd-swap{position:absolute;top:1px;right:2px;font-size:8px;opacity:.5;cursor:pointer;padding:2px;line-height:1;}
.wknd-swap:active{opacity:1;}
.wknd-row{display:flex;align-items:center;justify-content:center;gap:2px;width:100%;}
.wknd-rm{font-size:10px;opacity:.65;cursor:pointer;line-height:1;padding:3px;}
.wknd-rm:active{opacity:1;color:#f44336;}
.wknd-add{font-size:9px;opacity:.55;cursor:pointer;padding:1px 4px;margin-top:1px;border-radius:3px;}
.wknd-add:active{opacity:1;background:rgba(255,255,255,.4);}
.dc:active{background:#e3f0fd!important;}
.ci{display:flex;flex-direction:column;gap:2px;min-height:60px;}
.ci[draggable="true"]{cursor:grab;}
.ci.dragging{opacity:0.35;}
.dc.drag-over .ci{outline:2px dashed #378ADD;outline-offset:-2px;border-radius:5px;background:rgba(55,138,221,.08);}
.cc{flex:0 0 30px;border-radius:4px;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;padding:2px 4px;line-height:1.2;}
.ct{flex:1;min-height:26px;border-radius:4px;font-size:10px;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;padding:2px 4px;line-height:1.2;border:.5px solid transparent;}
.ct.ct-sav{min-height:48px;white-space:normal;line-height:1.3;-webkit-line-clamp:3;display:-webkit-box;-webkit-box-orient:vertical;}
.sc{font-size:0;border-radius:3px;}.sc.ct{border:.5px solid transparent;}

/* ── POPUPS ───────────────────────────────────────────────── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;}
.overlay.open{display:block;}
.popup{display:none;position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--bg);border-radius:16px;padding:18px;z-index:200;width:min(320px,calc(100vw - 28px));box-shadow:var(--shadow);}
.popup.open{display:block;}
.popup h3{font-size:14px;font-weight:600;margin-bottom:13px;}
.popup label{font-size:11px;color:var(--text2);display:block;margin-bottom:4px;}
.popup input[type=text],.popup textarea{width:100%;font-size:13px;padding:8px 10px;border-radius:var(--rs);border:.5px solid var(--border);background:var(--bg2);color:var(--text);margin-bottom:11px;font-family:inherit;resize:none;}
.popup input[type=text]:focus,.popup textarea:focus{outline:none;border-color:var(--blue);}
.cp-btns{display:flex;gap:6px;margin-bottom:11px;}
.cpb{flex:1;font-size:11px;padding:7px;border-radius:6px;border:.5px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;}
.pop-btns{display:flex;gap:7px;justify-content:flex-end;}
.pop-btns button{font-size:12px;padding:7px 13px;border-radius:var(--rs);border:.5px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;}
.pop-btns .ok{background:var(--blue);color:#fff;border-color:var(--blue);}
.pop-btns .del{color:#f44336;border-color:#f44336;}

/* Popup ajout pôle */
.pole-editor{display:none;position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--bg);border-radius:16px;padding:18px;z-index:250;width:min(300px,calc(100vw - 28px));box-shadow:var(--shadow);}
.pole-editor.open{display:block;}
.pole-editor h3{font-size:14px;font-weight:600;margin-bottom:13px;}
.pole-editor input{width:100%;font-size:13px;padding:8px 10px;border-radius:var(--rs);border:.5px solid var(--border);background:var(--bg2);color:var(--text);margin-bottom:10px;}
.color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:12px;}
.color-opt{width:32px;height:32px;border-radius:6px;cursor:pointer;border:2px solid transparent;}
.color-opt.sel{border-color:var(--text);}
.pole-editor .pop-btns{display:flex;gap:7px;justify-content:flex-end;}

.act-popup{display:none;position:fixed;background:var(--bg);border-radius:12px;padding:7px;z-index:300;width:190px;max-height:min(75vh,420px);overflow-y:auto;box-shadow:var(--shadow);border:.5px solid var(--border);}
.act-popup.open{display:block;}
.ao{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:5px;cursor:pointer;font-size:12px;color:var(--text);}
.ao:active{background:var(--bg2);}
.adot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}

.ctx-menu{display:none;position:fixed;background:var(--bg);border:.5px solid var(--border);border-radius:10px;padding:4px;z-index:350;min-width:155px;box-shadow:var(--shadow);}
.ctx-menu.open{display:block;}
.ctx-item{display:flex;align-items:center;gap:7px;padding:8px 11px;border-radius:5px;font-size:12px;cursor:pointer;color:var(--text);}
.ctx-item:hover{background:var(--bg2);}
.ctx-item.dis{color:var(--text3);cursor:default;}.ctx-item.dis:hover{background:none;}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:8px 16px;border-radius:18px;font-size:12px;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* ── IMPRESSION ───────────────────────────────────────────── */
#print-hdr{display:none;}
@media print{
  @page{size:A3 landscape;margin:6mm;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important;}
  header,.panel,.poles-bar,.overlay,.popup,.act-popup,.ctx-menu,.toast,.pole-editor{display:none!important;}
  #print-hdr{display:flex!important;align-items:baseline;gap:12px;padding:0 0 4mm;font-size:13px;font-weight:600;border-bottom:1px solid #ccc;margin-bottom:3mm;}
  #print-hdr span{font-size:10px;color:#666;font-weight:400;}
  body{font-size:9px;}
  #gantt-wrap{overflow:visible!important;max-height:none!important;}
  table{width:100%!important;min-width:unset!important;border-collapse:collapse!important;}
  /* Répéter l'en-tête en haut de chaque page imprimée */
  thead{display:table-header-group!important;}
  tbody{display:table-row-group!important;}
  tr{page-break-inside:avoid!important;}
  thead th{position:static!important;top:auto!important;}
  thead th.team-col{position:static!important;left:auto!important;min-width:80px!important;width:80px!important;}
  .team-cell{position:static!important;left:auto!important;min-width:80px!important;width:80px!important;max-width:80px!important;}
  thead th.dn,.dc.dn{width:55px!important;min-width:55px!important;max-width:55px!important;}
  thead th.ds,.dc.ds{width:16px!important;min-width:16px!important;max-width:16px!important;}
  .ci{min-height:44px!important;}
  .cc{flex:0 0 20px!important;font-size:7px!important;}
  .ct{font-size:6.5px!important;}
  .cn{font-size:8px!important;}
  .cab,.dcb,.acb{display:none!important;}
  /* Saut de page par pôle */
  .pole-break{page-break-before:always!important;break-before:page!important;}
  body.print-continuous .pole-break{page-break-before:auto!important;break-before:auto!important;}
  .pole-sep-row td{padding:3px 8px!important;font-size:9px!important;}
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1><i class="ti ti-calendar-week" style="font-size:16px"></i>Planning Jehanno</h1>
    <div class="sync-badge"><div class="sync-dot" id="sd"></div><span id="sl">…</span></div>
  </div>
  <div class="toolbar">
    <button class="btn" onclick="goToday()"><i class="ti ti-calendar-event"></i> Aujourd'hui</button>
    <div class="sep"></div>
    <button class="btn on" id="b15" onclick="setRange(15)">15j</button>
    <button class="btn" id="b30" onclick="setRange(30)">30j</button>
    <button class="btn" id="bpd" onclick="togglePanel('days')"><i class="ti ti-clock"></i></button>
    <div class="sep"></div>
    <button class="nav-btn" onclick="shiftDays(-1)"><i class="ti ti-chevron-left"></i></button>
    <span id="mlbl" style="font-size:12px;font-weight:600;min-width:80px;text-align:center;cursor:pointer;flex-shrink:0" onclick="togglePanel('cal')"></span>
    <button class="nav-btn" onclick="shiftDays(1)"><i class="ti ti-chevron-right"></i></button>
    <button class="btn" id="bpc" onclick="togglePanel('cal')"><i class="ti ti-calendar"></i></button>
    <div class="sep"></div>
    <button class="btn" onclick="printPlanning()" title="Imprimer avec sauts de page par pôle"><i class="ti ti-printer"></i></button>

// ── FÉRIÉS ───────────────────────────────────────────────────
function getFeries(yr){
  const f=new Set(),a=(m,d)=>f.add(yr+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0'));
  a(1,1);a(5,1);a(5,8);a(7,14);a(8,15);a(11,1);a(11,11);a(12,25);
  const A=yr%19,b=Math.floor(yr/100),c=yr%100,d2=Math.floor(b/4),e=b%4,f2=Math.floor((b+8)/25),g=Math.floor((b-f2+1)/3);
  const h=(19*A+b-d2-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m2=Math.floor((A+11*h+22*l)/451);
  const mo=Math.floor((h+l-7*m2+114)/31),da=((h+l-7*m2+114)%31)+1;
  const P=new Date(yr,mo-1,da);
  [1,39,50].forEach(o=>{const x=new Date(P);x.setDate(x.getDate()+o);a(x.getMonth()+1,x.getDate());});
  return f;
}
const FRC={};
function isFerie(date){const y=date.getFullYear();if(!FRC[y])FRC[y]=getFeries(y);const k=y+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');return FRC[y].has(k);}

}

// ── CACHE LOCAL (affichage hors-ligne) ─────────────────────────
// Copie locale des dernières données reçues de Firebase, pour que le
// planning reste visible même sans connexion (tablette hors ligne).
const CACHE_KEY='jehanno_planning_cache';
function saveCache(){
  try{
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      teams, cells, poles:POLES, weekend:weekendAssign, weekendNames,
      range:{start:startDate.toISOString().split('T')[0], days:nbDays},
      ts:Date.now()
    }));

}
function loadCache(){
  try{
    const raw=localStorage.getItem(CACHE_KEY);
    if(!raw)return false;
    const d=JSON.parse(raw);
    if(d.teams&&Array.isArray(d.teams))teams=d.teams;
    if(d.cells&&typeof d.cells==='object')cells=d.cells;
    if(d.poles&&Array.isArray(d.poles))POLES=d.poles;
    if(d.weekend&&typeof d.weekend==='object')weekendAssign=d.weekend;
    if(d.weekendNames&&typeof d.weekendNames==='object')weekendNames=d.weekendNames;
    if(d.range&&d.range.start&&d.range.days){
      startDate=new Date(d.range.start+'T00:00:00');
      nbDays=d.range.days;
    }
    return true;
  }catch(e){return false;}
}

// ── SAUVEGARDE / RESTAURATION MANUELLE (fichier .json sur le PC) ──
window.exportBackup=function(){
  try{
    const data={
      teams, cells, poles:POLES, weekend:weekendAssign, weekendNames,
      range:{start:startDate.toISOString().split('T')[0], days:nbDays},
      exportedAt:new Date().toISOString()
    };
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const d=new Date(),pad=n=>String(n).padStart(2,'0');
    a.href=url;
    a.download=`planning-jehanno-${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('Sauvegarde téléchargée ✓');
  }catch(e){
    toast('Erreur lors de la sauvegarde !');
  }
};

window.importBackup=function(event){
  const file=event.target.files&&event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(){
    try{
      const d=JSON.parse(reader.result);
      if(!d||!Array.isArray(d.teams)){toast('Fichier invalide.');return;}
      if(!confirm('Restaurer cette sauvegarde va remplacer les données actuelles (et les renvoyer sur Firebase). Continuer ?'))return;
      teams=d.teams;
      cells=(d.cells&&typeof d.cells==='object')?d.cells:{};
      weekendAssign=(d.weekend&&typeof d.weekend==='object')?d.weekend:{};
      weekendNames=(d.weekendNames&&typeof d.weekendNames==='object')?d.weekendNames:{};
      if(d.poles&&Array.isArray(d.poles))POLES=d.poles;
      if(d.range&&d.range.start&&d.range.days){
        startDate=new Date(d.range.start+'T00:00:00');
        nbDays=d.range.days;
        updRB();updLbl();renderCal();
      }
      ensureTeamIds();
      buildChips();render();
      svT();svC();svP();svR();svW();svN();
      toast('Sauvegarde restaurée ✓');
    }catch(e){
      toast('Fichier illisible !');
    }finally{
      event.target.value='';
    }
  };
  reader.readAsText(file);
};
let calViewDate=new Date(),openPanel=null;
let clipboard=null,ctxCell=null,lpt=null;
let movingTi=null;
let editingPoleId=null,selectedColorIdx=0;
startDate.setHours(0,0,0,0);

function dateKey(d){const x=DD(d);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');}
const K=(t,d)=>t+'_'+dateKey(d);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const tMs=()=>{let d=new Date();d.setHours(0,0,0,0);return d.getTime();};
function DD(d){let x=new Date(startDate);x.setDate(x.getDate()+d);x.setHours(0,0,0,0);return x;}
const isWk=d=>{const x=DD(d);return x.getDay()===0||x.getDay()===6;};
const isFO=d=>isFerie(DD(d));
const isSlim=d=>isFO(d)&&!isWk(d);
const isToday=d=>DD(d).getTime()===tMs();
function fmtD(d){const x=DD(d),s=isSlim(d);return (s?['D','L','M','M','J','V','S']:['Di','Lu','Ma','Me','Je','Ve','Sa'])[x.getDay()]+'<br>'+x.getDate();}
function wkNum(date){const d=new Date(date);d.setHours(0,0,0,0);d.setDate(d.getDate()+3-(d.getDay()+6)%7);const w=new Date(d.getFullYear(),0,4);return 1+Math.round(((d-w)/86400000-3+(w.getDay()+6)%7)/7);}
const domAct=t=>{const c={};t.compagnons.forEach(x=>{c[x.actId]=(c[x.actId]||0)+1;});return Object.entries(c).sort((a,b)=>b[1]-a[1])[0]?.[0]||'autre';};
function ensureTeamIds(){
  let changed=false;
  teams.forEach(t=>{ if(!t.id){ t.id='tm_'+Date.now()+'_'+Math.random().toString(36).slice(2,8); changed=true; } });
  return changed;
}
function weekendKey(teamId,d){return teamId+'_'+dateKey(d);}
function teamsInSamePole(poleId){return teams.filter(t=>domAct(t)===poleId);}
function getWeekendAssign(team,d){const k=weekendKey(team.id,d);return weekendAssign[k]||team.id;}
function getWeekendNames(team,d,assignedTeam){
  const k=weekendKey(team.id,d);
  const ov=weekendNames[k];
  if(ov&&Array.isArray(ov))return ov.map(v=>v!=null?v:'');
  return (assignedTeam.compagnons&&assignedTeam.compagnons.length)?assignedTeam.compagnons.map(c=>c.name):[assignedTeam.name];
}
function teamNamesLabel(t){if(t&&t.compagnons&&t.compagnons.length)return t.compagnons.map(c=>c.name).join(', ');return (t&&t.name)||'Équipe';}
function compagnonsInPole(poleId){
  const list=[];
  teams.forEach((t,ti)=>{t.compagnons.forEach((c,ci)=>{if(c.actId===poleId)list.push({name:c.name,ti,ci});});});
  return list;
}

function buildColumns(){
  const cols=[];let d=0;
  while(d<nbDays){
    if(isWk(d)){
      const dow=DD(d).getDay();
      if(dow===6&&d+1<nbDays&&isWk(d+1)){cols.push({type:'weekend',days:[d,d+1]});d+=2;}
      else{cols.push({type:'weekend',days:[d]});d+=1;}
    } else {cols.push({type:'day',days:[d]});d+=1;}
  }
  return cols;
}
function mHdr(cols){let r=[],c=null;cols.forEach(col=>{const x=DD(col.days[0]),m=x.toLocaleString('fr-FR',{month:'long',year:'numeric'});if(!c||c.n!==m){c={n:m,k:1};r.push(c);}else c.k++;});return r;}
function wHdr(cols){let r=[],c=null;cols.forEach(col=>{const w=wkNum(DD(col.days[0]));if(!c||c.w!==w){c={w,k:1};r.push(c);}else c.k++;});return r;}

onValue(ref(db,TR),s=>{const d=s.val();if(d&&Array.isArray(d)){teams=d;if(ensureTeamIds())svT();render();buildChips();saveCache();}ss('ok');},()=>ss('err'));

onValue(ref(db,PR),s=>{const d=s.val();if(d&&Array.isArray(d)){POLES=d;buildChips();render();saveCache();}});

  startDate=t;calViewDate=new Date(t);updRB();updLbl();renderCal();render();svR();

function renderCal(){
  const yr=calViewDate.getFullYear(),mo=calViewDate.getMonth();
  document.getElementById('cpl').textContent=new Date(yr,mo,1).toLocaleString('fr-FR',{month:'long',year:'numeric'}).replace(/^\w/,c=>c.toUpperCase());
  document.getElementById('chdr').innerHTML=['Lu','Ma','Me','Je','Ve','Sa','Di'].map(d=>`<div>${d}</div>`).join('');
  const g=document.getElementById('cgrid');g.innerHTML='';
  const fd=new Date(yr,mo,1);let sd=fd.getDay()||7;
  const ld=new Date(yr,mo+1,0).getDate(),rS=startDate.getTime();
  const rE=new Date(startDate);rE.setDate(rE.getDate()+nbDays-1);rE.setHours(23,59,59);
  const tm=tMs(),pl=new Date(yr,mo,0).getDate();
  for(let i=sd-1;i>0;i--){const d=new Date(yr,mo-1,pl-i+1);d.setHours(0,0,0,0);g.appendChild(calEl(d,true,rS,rE.getTime(),tm));}
  for(let i=1;i<=ld;i++){const d=new Date(yr,mo,i);d.setHours(0,0,0,0);g.appendChild(calEl(d,false,rS,rE.getTime(),tm));}
  const tot=(sd-1)+ld,nx=tot%7===0?0:7-(tot%7);
  for(let i=1;i<=nx;i++){const d=new Date(yr,mo+1,i);d.setHours(0,0,0,0);g.appendChild(calEl(d,true,rS,rE.getTime(),tm));}
}
function calEl(date,other,rS,rE,tm){
  const el=document.createElement('div'),dMs=date.getTime(),dw=date.getDay(),wk=dw===0||dw===6,fe=isFerie(date);
  let cls='cd';
  if(other)cls+=' om';if(dMs===tm)cls+=' td';if(wk)cls+=' wk';if(fe&&!other)cls+=' fe';
  if(dMs>=rS&&dMs<=rE)cls+=wk?' wk ir':' ir';
  if(dMs===rS)cls+=' rs';if(dMs===rE)cls+=' re';
  el.className=cls;el.textContent=date.getDate();
  el.onclick=()=>{startDate=new Date(date);startDate.setHours(0,0,0,0);updLbl();renderCal();render();svR();};
  return el;
}

window.savePole=function(){
  const name=document.getElementById('ped-name').value.trim();
  if(!name){toast('Nom requis');return;}
  const col=PALETTE[selectedColorIdx];
  if(editingPoleId){
    const p=POLES.find(x=>x.id===editingPoleId);

  }

window.deletePole=function(){
  if(!editingPoleId||POLES.length<=1)return;
  if(!confirm('Supprimer ce pôle ?'))return;
  POLES=POLES.filter(p=>p.id!==editingPoleId);
  // Réassigner les compagnons de ce pôle vers "autre" ou le premier pôle restant
  const fallback=POLES[0].id;
  teams.forEach(t=>t.compagnons.forEach(c=>{if(c.actId===editingPoleId)c.actId=fallback;}));

function letterColor(str){
  if(!str)return null;
  const first=str.trim()[0];
  if(!first)return null;
  // Chiffre 0-9
  const digit=parseInt(first);
  if(!isNaN(digit))return DCOLORS[digit];
  // Lettre A-Z
  const code=first.toUpperCase().charCodeAt(0);
  if(code>=65&&code<=90)return LCOLORS[code-65];
  return null;
}

function render(){
  const g=document.getElementById('gantt'),cols=buildColumns(),mh=mHdr(cols),wh=wHdr(cols);

  let h='<thead><tr class="tr-month"><th class="team-col" rowspan="3" style="vertical-align:bottom;padding-bottom:7px">Équipes</th>';
  mh.forEach(m=>{h+=`<th colspan="${m.k}" class="month-hd">${m.n}</th>`;});
  h+='</tr><tr class="tr-week">';
  wh.forEach(w=>{h+=`<th colspan="${w.k}" class="week-cell">S${w.w}</th>`;});
  h+='</tr><tr class="tr-days">';
  cols.forEach(col=>{
    if(col.type==='weekend'){
      const feG=col.days.some(isFO),tdG=col.days.some(isToday);
      let cls='dw wk'+(feG?' fe':'')+(tdG?' th':'');
      h+=`<th class="${cls}"${tdG?' style="font-weight:700"':''}>Équipe</th>`;
    } else {
      const d=col.days[0],sl=isSlim(d),fe=isFO(d),wk=isWk(d),td=isToday(d);
      let cls=(sl?'ds':'dn')+(fe?' fe':wk?' wk':'')+(td?' th':'');
      h+=`<th class="${cls}"${td?' style="font-weight:700"':''}>${fmtD(d)}</th>`;
    }
  });
  h+='</tr></thead><tbody>';

  let indexed=teams.map((team,ti)=>({team,ti}));
  let visible=indexed.filter(({team})=>activeFilters.size===0||activeFilters.has(domAct(team)));
  if(sortByPole)visible=[...visible].sort((a,b)=>{
    const la=poleById(domAct(a.team)).label.toLowerCase();
    const lb=poleById(domAct(b.team)).label.toLowerCase();
    return la.localeCompare(lb,'fr');
  });

  let lastPole=null,firstPole=true;
  visible.forEach(({team,ti})=>{
    const pid=domAct(team),pole=poleById(pid);
    if(sortByPole&&pid!==lastPole){
      // Séparateur — class pole-break pour saut de page impression (sauf le 1er)
      const breakCls=(!firstPole)?'pole-break':'';
      h+=`<tr class="pole-sep-row ${breakCls}"><td colspan="${colCount+1}" style="padding:0;background:${pole.bg};-webkit-print-color-adjust:exact;print-color-adjust:exact">
        <div style="position:sticky;left:0;display:inline-flex;align-items:center;padding:5px 10px;color:${pole.text};font-size:11px;font-weight:600;white-space:nowrap;z-index:3">
          <i class="ti ${pole.icon||'ti-circle'}" style="font-size:12px;margin-right:5px"></i>${pole.label.toUpperCase()}
        </div>
      </td></tr>`;
      lastPole=pid;firstPole=false;
    }
    h+=teamRow(team,ti,pole);
  });
  if(visible.length===0)h+=`<tr><td colspan="${colCount+1}" style="text-align:center;padding:28px;color:var(--text3)">Aucune équipe</td></tr>`;
  h+='</tbody>';
  g.innerHTML=h;

  // Events
  document.querySelectorAll('.dc').forEach(td=>{
    if(td.classList.contains('wknd-cell'))return;
    const ti=parseInt(td.dataset.ti),d=parseInt(td.dataset.d);
    td.addEventListener('contextmenu',e=>openCtx(e,ti,d));
    td.addEventListener('touchstart',e=>{lpt=setTimeout(()=>{openCtx({preventDefault:()=>{},clientX:e.touches[0].clientX,clientY:e.touches[0].clientY},ti,d);},600);},{passive:true});
    td.addEventListener('touchend',()=>clearTimeout(lpt));
    td.addEventListener('touchmove',()=>clearTimeout(lpt));
  });
  document.querySelectorAll('.team-handle').forEach(hd=>{
    const ti=parseInt(hd.dataset.ti);
    let handleTimer=null;
    const start=()=>{handleTimer=setTimeout(()=>{startMove(ti);},550);};
    const cancel=()=>{clearTimeout(handleTimer);};
    hd.addEventListener('touchstart',start,{passive:true});
    hd.addEventListener('touchend',cancel);
    hd.addEventListener('touchmove',cancel);
    hd.addEventListener('mousedown',e=>{e.preventDefault();start();});
    hd.addEventListener('mouseup',cancel);
    hd.addEventListener('mouseleave',cancel);
  });
  renderMobileHeader();
  if(movingTi!==null)refreshMoveUI();
}

function teamRow(team,ti,pole){

  renderCols.forEach(col=>{
    if(col.type==='weekend'){
      const d=col.days[0];
      const feG=col.days.some(isFO),tdG=col.days.some(isToday);
      const assignedId=getWeekendAssign(team,d);

      row+=`<td class="${cls}" data-ti="${ti}" data-d="${d}"><div class="ci wknd-ci" style="min-height:${rowH}"><div class="wknd-disp" style="background:${wPole.bg};color:${wPole.text}">${namesHtml}<span class="wknd-add" title="Ajouter un compagnon" onclick="event.stopPropagation();addWeekendSlot(${ti},${d})"><i class="ti ti-plus"></i></span><span class="wknd-swap" title="Changer d'équipe" onclick="openWeekendPicker(event,${ti},${d})"><i class="ti ti-arrows-right-left"></i></span></div></div></td>`;
      return;
    }
    const d=col.days[0];
    const k=K(ti,d),c=cells[k],sl=isSlim(d),fe=isFO(d),td=isToday(d);
    let cls='dc'+(sl?' ds':' dn')+(fe?' fe':'')+(td?' tc':'');
    let cH='<div class="cc"></div>',tH=`<div class="ct${isSAV?' ct-sav':''}"></div>`;
    if(c){
      const lc=letterColor(c.chantier);
      const cbg=lc?lc.bg:pole.bg, ctx2=lc?lc.tx:pole.text;

      const tb=`background:${cbg};color:${ctx2};opacity:0.75;border-color:${cbg};-webkit-print-color-adjust:exact;print-color-adjust:exact`;
      if(sl){cH=`<div class="cc sc" style="${pb};opacity:.8"></div>`;tH=`<div class="ct sc" style="${tb};opacity:.8"></div>`;}
      else{cH=`<div class="cc" style="${pb}">${esc(c.chantier)}</div>`;tH=`<div class="ct${isSAV?' ct-sav':''}" style="${tb}">${esc(c.tache||'')}</div>`;}

  });
  return row+'</tr>';

  const ch=document.getElementById('ich').value.trim(),ta=document.getElementById('ita').value.trim(),k=K(popCell.ti,popCell.d);
  if(ch||ta)cells[k]={chantier:ch,tache:ta};else delete cells[k];
  closeAll();render();svC();
};
window.popDel=()=>{if(!popCell)return;delete cells[K(popCell.ti,popCell.d)];closeAll();render();svC();};
window.popCopy=()=>{
  const ch=document.getElementById('ich').value.trim(),ta=document.getElementById('ita').value.trim();
  if(!ch&&!ta){toast('Rien à copier');return;}
  clipboard={chantier:ch,tache:ta};
  const b=document.getElementById('cpybtn');b.style.background='#C0DD97';b.style.color='#27500A';b.innerHTML='<i class="ti ti-check"></i> Copié !';
  setTimeout(()=>{b.style.background='';b.style.color='';b.innerHTML='<i class="ti ti-copy" style="font-size:13px"></i> Copier';},1500);
};
window.popPaste=()=>{
  if(!clipboard){toast('Presse-papier vide');return;}
  document.getElementById('ich').value=clipboard.chantier||'';
  document.getElementById('ita').value=clipboard.tache||'';
  const b=document.getElementById('pastbtn');b.style.background='#B5D4F4';b.style.color='#0C447C';b.innerHTML='<i class="ti ti-check"></i> Collé !';
  setTimeout(()=>{b.style.background='';b.style.color='';b.innerHTML='<i class="ti ti-clipboard" style="font-size:13px"></i> Coller';},1500);
};

// ── COMPAGNONS ────────────────────────────────────────────────
window.renC=el=>{const ti=parseInt(el.dataset.ti),ci=parseInt(el.dataset.ci),v=el.innerText.trim();if(v)teams[ti].compagnons[ci].name=v;else el.innerText=teams[ti].compagnons[ci].name;svT();};
window.setWeekendNameOverride=function(ti,d,aci,name){
  const team=teams[ti];if(!team)return;
  const k=weekendKey(team.id,d);
  const assignedId=getWeekendAssign(team,d);
  const assignedTeam=teams.find(t=>t.id===assignedId)||team;
  const arr=getWeekendNames(team,d,assignedTeam);
  while(arr.length<=aci)arr.push('');
  arr[aci]=name;
  weekendNames[k]=arr;
  render();svN();
};
window.addWeekendSlot=function(ti,d){
  const team=teams[ti];if(!team)return;
  const k=weekendKey(team.id,d);
  const assignedId=getWeekendAssign(team,d);
  const assignedTeam=teams.find(t=>t.id===assignedId)||team;
  const arr=getWeekendNames(team,d,assignedTeam);
  const newIdx=arr.length;
  arr.push('');
  weekendNames[k]=arr;
  render();svN();
  const pole=poleById(domAct(team));
  const td=document.querySelector(`td.wknd-cell[data-ti="${ti}"][data-d="${d}"]`);
  const span=td?td.querySelectorAll('.wknd-name')[newIdx]:null;
  if(span)openWkndNamePicker({target:span,stopPropagation(){}},ti,d,newIdx,pole.id);
};
window.removeWeekendSlot=function(ti,d,aci){
  const team=teams[ti];if(!team)return;
  const k=weekendKey(team.id,d);
  const assignedId=getWeekendAssign(team,d);
  const assignedTeam=teams.find(t=>t.id===assignedId)||team;
  const arr=getWeekendNames(team,d,assignedTeam);
  if(arr.length<=1)return;
  arr.splice(aci,1);
  weekendNames[k]=arr;
  render();svN();
};
window.openWkndNamePicker=function(e,ti,d,aci,poleId){
  const team=teams[ti];if(!team)return;
  const targetSpan=e.target;
  const assignedId=getWeekendAssign(team,d);
  const assignedTeam=teams.find(t=>t.id===assignedId)||team;
  const currentList=getWeekendNames(team,d,assignedTeam);
  const current=currentList[aci];
  const pole=poleById(poleId);
  const list=compagnonsInPole(poleId);
  const pop=document.getElementById('apop');pop.innerHTML='';

  const autreOpt=document.createElement('div');autreOpt.className='ao';
  autreOpt.innerHTML=`<div class="adot" style="background:${pole.bg};opacity:.35"></div><span style="font-style:italic">Autre… (modifier le prénom)</span>`;
  autreOpt.onclick=()=>{
    closeAll();
    targetSpan.textContent=(current||'');
    targetSpan.contentEditable='true';
    targetSpan.focus();
    const range=document.createRange();range.selectNodeContents(targetSpan);range.collapse(false);
    const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
    targetSpan.onkeydown=(ev)=>{if(ev.key==='Enter'){ev.preventDefault();targetSpan.blur();}};
    targetSpan.onblur=()=>{
      const v=targetSpan.textContent.trim();
      targetSpan.contentEditable='false';
      setWeekendNameOverride(ti,d,aci,v);
    };
  };
  pop.appendChild(autreOpt);

  if(currentList.length>1){
    const rmOpt=document.createElement('div');rmOpt.className='ao';
    rmOpt.innerHTML=`<div class="adot" style="background:${pole.bg};opacity:.35"></div><span style="font-style:italic;color:#f44336">Retirer cette personne</span>`;
    rmOpt.onclick=()=>{removeWeekendSlot(ti,d,aci);closeAll();};
    pop.appendChild(rmOpt);
  }

  list.forEach(entry=>{
    const o=document.createElement('div');o.className='ao';
    const isSel=entry.name===current;
    o.innerHTML=`<div class="adot" style="background:${pole.bg}"></div><span style="${isSel?'font-weight:700':''}">${esc(entry.name)}</span>`;
    o.onclick=()=>{setWeekendNameOverride(ti,d,aci,entry.name);closeAll();};
    pop.appendChild(o);
  });
  pop.classList.add('open');document.getElementById('ov').classList.add('open');
  positionPopup(pop, targetSpan.getBoundingClientRect());
};
window.addC=ti=>{teams[ti].compagnons.push({name:'Nouveau',actId:POLES[0].id});render();svT();};
window.delC=(ti,ci)=>{
  teams[ti].compagnons.splice(ci,1);
  if(teams[ti].compagnons.length===0){
    const deadId=teams[ti].id;
    Object.keys(cells).filter(k=>k.startsWith(ti+'_')).forEach(k=>delete cells[k]);
    teams.splice(ti,1);
    if(deadId){
      let touched=false,touchedN=false;
      Object.keys(weekendAssign).forEach(k=>{
        if(k.startsWith(deadId+'_')||weekendAssign[k]===deadId){delete weekendAssign[k];touched=true;}
      });
      Object.keys(weekendNames).forEach(k=>{
        if(k.startsWith(deadId+'_')){delete weekendNames[k];touchedN=true;}
      });
      if(touched)svW();
      if(touchedN)svN();
    }
    svC();toast('Équipe supprimée');
  }
  render();buildChips();svT();
};
window.addTeam=()=>{teams.push({id:'tm_'+Date.now()+'_'+Math.random().toString(36).slice(2,8),name:'Nouvelle équipe',compagnons:[{name:'Compagnon',actId:POLES[0].id}]});render();buildChips();svT();};

// ── ACT POPUP ─────────────────────────────────────────────────
window.openAP=(e,ti,ci)=>{
  e.stopPropagation();
  const pop=document.getElementById('apop');pop.innerHTML='';
  POLES.forEach(p=>{
    const o=document.createElement('div');o.className='ao';
    o.innerHTML=`<div class="adot" style="background:${p.bg}"></div><i class="ti ${p.icon||'ti-circle'}" style="font-size:13px;color:${p.text}"></i><span>${p.label}</span>`;
    o.onclick=()=>{teams[ti].compagnons[ci].actId=p.id;closeAll();render();buildChips();svT();};
    pop.appendChild(o);
  });
  pop.classList.add('open');document.getElementById('ov').classList.add('open');
  positionPopup(pop, e.target.closest('.cab').getBoundingClientRect());
};

// ── RAPPEL ÉQUIPE WEEK-END ───────────────────────────────────
window.setWeekendTeam=function(ti,d,teamId){
  const team=teams[ti];if(!team)return;
  const k=weekendKey(team.id,d);
  if(teamId===team.id)delete weekendAssign[k];else weekendAssign[k]=teamId;
  delete weekendNames[k];
  render();svW();svN();
};
window.openWeekendPicker=function(e,ti,d){
  e.stopPropagation();
  const team=teams[ti];if(!team)return;
  const pole=poleById(domAct(team));
  const opts=teamsInSamePole(pole.id);
  const assignedId=getWeekendAssign(team,d);
  const pop=document.getElementById('apop');pop.innerHTML='';
  opts.forEach(t=>{
    const o=document.createElement('div');o.className='ao';
    const isSel=t.id===assignedId;
    o.innerHTML=`<div class="adot" style="background:${pole.bg}"></div><span style="${isSel?'font-weight:700':''}">${esc(teamNamesLabel(t))}</span>`;
    o.onclick=()=>{setWeekendTeam(ti,d,t.id);closeAll();};
    pop.appendChild(o);
  });
  pop.classList.add('open');document.getElementById('ov').classList.add('open');
  positionPopup(pop, (e.target.closest('.wknd-disp')||e.target).getBoundingClientRect());
};

function positionPopup(pop,rect){
  const pw=pop.offsetWidth||190,ph=pop.offsetHeight||160;
  let x=rect.left,y=rect.bottom+4;
  if(x+pw>window.innerWidth-8)x=window.innerWidth-pw-8;
  if(x<8)x=8;
  if(y+ph>window.innerHeight-8)y=rect.top-ph-4;
  if(y<8)y=8;
  if(y+ph>window.innerHeight-8)y=Math.max(8,window.innerHeight-ph-8);
  pop.style.left=x+'px';pop.style.top=y+'px';
}

// ── CLOSE ALL ─────────────────────────────────────────────────
window.closeAll=()=>{
  ['cpop','apop','ov'].forEach(id=>document.getElementById(id).classList.remove('open'));
  document.getElementById('ped').classList.remove('open');
  closeCtx();popCell=null;
};
document.getElementById('ich').addEventListener('keydown',e=>{if(e.key==='Tab'){e.preventDefault();document.getElementById('ita').focus();}});

// ── IMPRESSION ────────────────────────────────────────────────
window.printPlanning=()=>{
  const ph=document.getElementById('print-hdr');
  const d1=startDate.toLocaleDateString('fr-FR',{day:'numeric',month:'long'});
  const d2=new Date(startDate);d2.setDate(d2.getDate()+nbDays-1);
  const d2s=d2.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  const actTeams=teams.filter(t=>activeFilters.size===0||activeFilters.has(domAct(t)));
  ph.innerHTML=`📅 Planning Jehanno — ${d1} au ${d2s} &nbsp;<span>${actTeams.length} équipe${actTeams.length>1?'s':''} · Imprimé le ${new Date().toLocaleDateString('fr-FR')}</span>`;
  // Activer tri par pôle pour impression avec sauts de page
  const wasSort=sortByPole;
  if(!wasSort){sortByPole=true;render();}
  document.body.classList.remove('print-continuous');
  setTimeout(()=>{
    window.print();
    if(!wasSort){sortByPole=false;render();}
  },300);
};

window.printPlanningContinu=()=>{
  const ph=document.getElementById('print-hdr');
  const d1=startDate.toLocaleDateString('fr-FR',{day:'numeric',month:'long'});
  const d2=new Date(startDate);d2.setDate(d2.getDate()+nbDays-1);
  const d2s=d2.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  const actTeams=teams.filter(t=>activeFilters.size===0||activeFilters.has(domAct(t)));
  ph.innerHTML=`📅 Planning Jehanno — ${d1} au ${d2s} &nbsp;<span>${actTeams.length} équipe${actTeams.length>1?'s':''} · Imprimé le ${new Date().toLocaleDateString('fr-FR')}</span>`;
  // Pas de saut de page par pôle : on garde le tri actuel tel quel, sans forcer de pole-break
  document.body.classList.add('print-continuous');
  setTimeout(()=>{
    window.print();
    document.body.classList.remove('print-continuous');
  },300);
};

// ── DRAG & DROP (déplacer un chantier d'une case à l'autre) ───
let dragSourceKey=null;
window.dragStart=(e,key)=>{
  dragSourceKey=key;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',key);
  e.target.classList.add('dragging');
};
window.dragOver=(e)=>{
  e.preventDefault();
  const td=e.currentTarget.closest('.dc');
  if(td)td.classList.add('drag-over');
};
window.dragLeave=(e)=>{
  const td=e.currentTarget.closest('.dc');
  if(td)td.classList.remove('drag-over');
};
window.dropCell=(e,ti,d)=>{
  e.preventDefault();
  const td=e.currentTarget.closest('.dc');
  if(td)td.classList.remove('drag-over');
  document.querySelectorAll('.ci.dragging').forEach(el=>el.classList.remove('dragging'));
  if(!dragSourceKey)return;
  const targetKey=K(ti,d);
  if(dragSourceKey===targetKey){dragSourceKey=null;return;}
  const srcData=cells[dragSourceKey];
  if(!srcData){dragSourceKey=null;return;}
  const destData=cells[targetKey];
  if(destData){
    if(!confirm(`Remplacer "${destData.chantier}" par "${srcData.chantier}" ?`)){dragSourceKey=null;return;}
  }
  cells[targetKey]={...srcData};
  delete cells[dragSourceKey];
  dragSourceKey=null;
  justDragged=true;
  render();svC();
  toast('📦 Chantier déplacé');
};

// -- REORDONNER LES EQUIPES (appui long sur la poignee) --------
function currentVisibleList(){
  let indexed=teams.map((team,ti)=>({team,ti}));
  let visible=indexed.filter(({team})=>activeFilters.size===0||activeFilters.has(domAct(team)));
  if(sortByPole)visible=[...visible].sort((a,b)=>{
    const la=poleById(domAct(a.team)).label.toLowerCase();
    const lb=poleById(domAct(b.team)).label.toLowerCase();
    return la.localeCompare(lb,'fr');
  });
  return visible;
}
function positionMoveToolbar(){
  const bar=document.getElementById('moveToolbar'),hdr=document.querySelector('header');
  if(!bar||!hdr)return;
  bar.style.top=(hdr.getBoundingClientRect().bottom+8)+'px';
}
function refreshMoveUI(){
  document.querySelectorAll('tr.row-moving').forEach(r=>r.classList.remove('row-moving'));
  const bar=document.getElementById('moveToolbar');
  if(movingTi===null||!teams[movingTi]){bar.classList.remove('open');return;}
  bar.classList.add('open');
  positionMoveToolbar();
  const tr=document.querySelector(`tr[data-ti="${movingTi}"]`);
  if(tr)tr.classList.add('row-moving');
  const lbl=document.getElementById('mtLabel');
  if(lbl)lbl.textContent=teams[movingTi].name||'Equipe';
  const visible=currentVisibleList();
  const pos=visible.findIndex(v=>v.ti===movingTi);
  document.getElementById('mtUp').disabled=(pos<=0);
  document.getElementById('mtDown').disabled=(pos<0||pos>=visible.length-1);
}
window.addEventListener('resize',()=>{if(movingTi!==null)positionMoveToolbar();});
window.startMove=function(ti){
  movingTi=ti;
  refreshMoveUI();
  if(document.querySelector(`tr[data-ti="${ti}"]`))document.querySelector(`tr[data-ti="${ti}"]`).scrollIntoView({behavior:'smooth',block:'nearest'});
  if(navigator.vibrate)navigator.vibrate(15);
};
function swapCellsForIndices(a,b){
  const pa=a+'_',pb=b+'_';
  const dataA={},dataB={};
  Object.keys(cells).forEach(k=>{
    if(k.startsWith(pa)){dataA[k.slice(pa.length)]=cells[k];delete cells[k];}
    else if(k.startsWith(pb)){dataB[k.slice(pb.length)]=cells[k];delete cells[k];}
  });
  Object.keys(dataA).forEach(suf=>{cells[pb+suf]=dataA[suf];});
  Object.keys(dataB).forEach(suf=>{cells[pa+suf]=dataB[suf];});
}
window.moveTeam=function(dir){
  if(movingTi===null)return;
  const visible=currentVisibleList();
  const pos=visible.findIndex(v=>v.ti===movingTi);
  const newPos=pos+dir;
  if(pos<0||newPos<0||newPos>=visible.length)return;
  const otherTi=visible[newPos].ti;
  swapCellsForIndices(movingTi,otherTi);
  [teams[movingTi],teams[otherTi]]=[teams[otherTi],teams[movingTi]];
  movingTi=otherTi;
  render();
  svT();
  svC();
};
window.endMove=function(){
  movingTi=null;
  document.querySelectorAll('tr.row-moving').forEach(r=>r.classList.remove('row-moving'));
  const bar=document.getElementById('moveToolbar');
  if(bar)bar.classList.remove('open');
};
document.addEventListener('click',e=>{
  if(movingTi===null)return;
  if(e.target.closest('#moveToolbar')||e.target.closest('.team-handle'))return;
  endMove();
});

function toast(msg){const t=document.getElementById('tst');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// ── POSITION DU MINI-HEADER MOBILE (sous le header sticky) ───
function updMobileHdrPos(){
  const wrap=document.getElementById('mobile-hdr-wrap');
  const hdr=document.querySelector('header');
  if(!wrap||!hdr)return;
  if(window.innerWidth<=900){
    wrap.style.top=hdr.offsetHeight+'px';
  }
}
window.addEventListener('resize', updMobileHdrPos);
window.addEventListener('orientationchange', ()=>setTimeout(updMobileHdrPos,250));

// ── INIT ──────────────────────────────────────────────────────
const t0=new Date();t0.setHours(0,0,0,0);let dw=t0.getDay();if(dw===0)dw=7;t0.setDate(t0.getDate()-(dw-1));
startDate=t0;calViewDate=new Date(t0);
const hasCache=loadCache();
if(hasCache)calViewDate=new Date(startDate);
ensureTeamIds();
loadFilterPrefs();
if(!navigator.onLine)ss('err');else ss('syncing');
updRB();buildChips();updLbl();renderCal();render();
document.getElementById('bsort').classList.toggle('on',sortByPole);
updMobileHdrPos();
setTimeout(updMobileHdrPos,300);

// ── MIGRATION : nettoyer les anciennes cellules (format ti_offset) ──
// Une seule fois : si des clés Firebase ne suivent pas le format ti_YYYY-MM-DD, on les efface.
setTimeout(async ()=>{
  try{
    const snap=await new Promise(res=>onValue(ref(db,CR),s=>res(s),{onlyOnce:true}));
    const data=snap.val();
    if(data){
      const isOldFormat=Object.keys(data).some(k=>!/_\d{4}-\d{2}-\d{2}$/.test(k));
      if(isOldFormat){
        await set(ref(db,CR),null);
        cells={};
        render();
        toast('Anciennes données réinitialisées (nouveau format de dates)');
      }
    }
  }catch(e){}
},800);
</script>
