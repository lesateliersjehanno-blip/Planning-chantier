<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Planning Chantier — Jehanno</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root {
  --bg:#ffffff;--bg2:#f5f5f5;--bg3:#ebebeb;--border:#e0e0e0;
  --text:#1a1a1a;--text2:#666;--text3:#999;--blue:#378ADD;
  --radius:8px;--radius-sm:5px;--shadow:0 2px 16px rgba(0,0,0,0.10);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--border:#3a3a3c;
  --text:#f0f0f0;--text2:#aaa;--text3:#666;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;}

header{background:var(--bg);border-bottom:0.5px solid var(--border);padding:10px 14px;position:sticky;top:0;z-index:50;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.header-top h1{font-size:16px;font-weight:600;}
.sync-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;transition:background 0.3s;}
.sync-dot.ok{background:#4caf50;}
.sync-dot.syncing{background:#ff9800;animation:pulse 1s infinite;}
.sync-dot.err{background:#f44336;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

.toolbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.btn{font-size:12px;padding:5px 11px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;height:30px;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;}
.btn:active{background:var(--bg3);}
.sep{width:0.5px;height:20px;background:var(--border);margin:0 2px;}
input[type=date],input[type=number]{font-size:12px;padding:4px 7px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg);color:var(--text);height:30px;}

.act-filters{display:flex;gap:6px;flex-wrap:wrap;padding:8px 14px;border-bottom:0.5px solid var(--border);overflow-x:auto;}
.act-chip{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid transparent;white-space:nowrap;user-select:none;transition:opacity 0.15s,transform 0.1s;}
.act-chip:active{transform:scale(0.95);}
.act-chip.off{opacity:0.3;}

#gantt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{border-collapse:collapse;min-width:max-content;}
th,td{border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);}
thead th{background:var(--bg2);color:var(--text2);font-weight:500;font-size:11px;text-align:center;padding:5px 3px;white-space:nowrap;}
thead th.team-col{text-align:left;padding-left:10px;position:sticky;left:0;z-index:3;min-width:115px;width:115px;background:var(--bg2);}
thead th.month-hd{font-size:12px;font-weight:600;color:var(--text);}
thead th.wknd{background:var(--bg3);}

.team-cell{position:sticky;left:0;background:var(--bg);z-index:2;width:115px;min-width:115px;max-width:115px;padding:6px 7px;vertical-align:top;border-left:3px solid transparent;}
.compagnon-row{display:flex;align-items:center;gap:4px;margin-bottom:3px;}
.comp-name{font-size:11px;font-weight:500;color:var(--text);padding:1px 3px;border-radius:3px;border:1px solid transparent;flex:1;line-height:1.3;cursor:text;min-width:20px;}
.comp-name:focus{outline:none;border-color:var(--blue);background:var(--bg2);}
.comp-act-btn{width:22px;height:22px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;flex-shrink:0;}
.comp-act-btn:active{opacity:0.7;}
.add-comp-btn{font-size:10px;color:var(--text3);cursor:pointer;padding:1px 4px;border-radius:3px;display:inline-flex;align-items:center;gap:2px;margin-top:2px;}
.add-comp-btn:active{background:var(--bg2);}
.del-comp-btn{font-size:11px;color:var(--text3);cursor:pointer;flex-shrink:0;padding:2px;}
.del-comp-btn:active{color:#f44336;}

.day-cell{width:90px;min-width:90px;max-width:90px;padding:3px;vertical-align:top;cursor:pointer;}
.day-cell.wknd{background:var(--bg3);}
.day-cell:active{background:#e3f0fd!important;}
.cell-inner{display:flex;flex-direction:column;gap:2px;min-height:74px;}
.cell-chantier{flex:0 0 33px;border-radius:5px;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;padding:3px 5px;line-height:1.3;}
.cell-tache{flex:1;min-height:28px;border-radius:5px;font-size:10px;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;padding:3px 5px;line-height:1.3;border:0.5px solid transparent;}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:100;}
.overlay.open{display:block;}
.popup{display:none;position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--bg);border-radius:14px;padding:18px;z-index:200;width:calc(100vw - 32px);max-width:320px;box-shadow:var(--shadow);}
.popup.open{display:block;}
.popup h3{font-size:14px;font-weight:600;margin-bottom:14px;}
.popup label{font-size:11px;color:var(--text2);display:block;margin-bottom:4px;}
.popup input[type=text]{width:100%;font-size:13px;padding:8px 10px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg2);color:var(--text);margin-bottom:12px;}
.popup input[type=text]:focus{outline:none;border-color:var(--blue);}
.pop-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.pop-btns button{font-size:12px;padding:7px 14px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;}
.pop-btns .ok{background:var(--blue);color:#fff;border-color:var(--blue);}
.pop-btns .del{color:#f44336;border-color:#f44336;}

.act-popup{display:none;position:fixed;background:var(--bg);border-radius:14px;padding:8px;z-index:300;width:200px;box-shadow:var(--shadow);border:0.5px solid var(--border);}
.act-popup.open{display:block;}
.act-opt{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;color:var(--text);}
.act-opt:active{background:var(--bg2);}
.act-dot{width:14px;height:14px;border-radius:3px;flex-shrink:0;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;z-index:500;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1><i class="ti ti-calendar-week" style="font-size:18px;vertical-align:-2px;margin-right:5px"></i>Planning Jehanno</h1>
    <div class="sync-badge">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">Connexion…</span>
    </div>
  </div>
  <div class="toolbar">
    <div style="display:flex;align-items:center;gap:4px">
      <span style="font-size:11px;color:var(--text2)">Début</span>
      <input type="date" id="start-date">
    </div>
    <div style="display:flex;align-items:center;gap:4px">
      <span style="font-size:11px;color:var(--text2)">Jours</span>
      <input type="number" id="nb-days" min="5" max="60" value="15" style="width:50px">
    </div>
    <button class="btn" onclick="applyRange()"><i class="ti ti-refresh"></i> Appliquer</button>
    <div class="sep"></div>
    <button class="btn" onclick="addTeam()"><i class="ti ti-plus"></i> Équipe</button>
    <div class="sep"></div>
    <button class="btn" onclick="clearAllCells()" style="color:var(--text2)" title="Effacer toutes les saisies"><i class="ti ti-trash"></i></button>
  </div>
</header>

<div class="act-filters" id="act-filters"></div>
<div id="gantt-wrap"><table id="gantt"></table></div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="popup" id="cell-popup">
  <h3 id="cell-popup-title">Saisie chantier</h3>
  <label>Chantier</label>
  <input type="text" id="inp-chantier" placeholder="Nom du chantier…" maxlength="30">
  <label>Tâche / descriptif</label>
  <input type="text" id="inp-tache" placeholder="Ex : pose charpente…" maxlength="50">
  <div class="pop-btns">
    <button class="del" onclick="popDelete()"><i class="ti ti-trash"></i> Effacer</button>
    <button onclick="closeAll()">Annuler</button>
    <button class="ok" onclick="popOk()">OK</button>
  </div>
</div>

<div class="act-popup" id="act-popup"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set }         from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ── CONFIG FIREBASE ──────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyASl9qnu-poSZqp_9eUoDK0YbbjVYAnnz0",
  authDomain:        "oj-chantier-7ed1d.firebaseapp.com",
  databaseURL:       "https://oj-chantier-7ed1d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "oj-chantier-7ed1d",
  storageBucket:     "oj-chantier-7ed1d.firebasestorage.app",
  messagingSenderId: "212267939056",
  appId:             "1:212267939056:web:bf470ad83a6185671bfe35"
};
// ─────────────────────────────────────────────────────────────

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const BASE       = "planning/v1";
const TEAMS_REF  = BASE + "/teams";
const CELLS_REF  = BASE + "/cells";
const RANGE_REF  = BASE + "/range";

// ── ACTIVITÉS ────────────────────────────────────────────────
const ACTIVITIES = [
  { id:'pose',      label:'Pose chantier', icon:'ti-building-factory-2', bg:'#B5D4F4', text:'#0C447C', tBg:'#E6F1FB' },
  { id:'charpente', label:'Charpente',     icon:'ti-home-2',             bg:'#C0DD97', text:'#27500A', tBg:'#EAF3DE' },
  { id:'atelier',   label:'Atelier',       icon:'ti-tools',              bg:'#FAC775', text:'#633806', tBg:'#FAEEDA' },
  { id:'autre',     label:'Autre',         icon:'ti-dots',               bg:'#D3D1C7', text:'#444441', tBg:'#F1EFE8' },
];
const actById = id => ACTIVITIES.find(a => a.id === id) || ACTIVITIES[3];

// ── STATE ────────────────────────────────────────────────────
let teams = [
  { name:'Équipe Laurent', compagnons:[{name:'Laurent',actId:'pose'},{name:'Le Dain',actId:'pose'}] },
  { name:'Équipe Mathieu', compagnons:[{name:'Mathieu',actId:'charpente'},{name:'Hugo',actId:'charpente'}] },
  { name:'Équipe Denis',   compagnons:[{name:'Denis',actId:'atelier'}] },
  { name:'Équipe Pearce',  compagnons:[{name:'Pearce',actId:'pose'},{name:'Jérémy',actId:'pose'}] },
  { name:'Équipe Nicolas', compagnons:[{name:'Nicolas',actId:'charpente'}] },
  { name:'Équipe Sylvain', compagnons:[{name:'Sylvain',actId:'atelier'},{name:'Ronan',actId:'atelier'}] },
  { name:'Équipe Yann',    compagnons:[{name:'Yann',actId:'pose'}] },
  { name:'Équipe Pierre',  compagnons:[{name:'Pierre',actId:'charpente'}] },
];
let cells = {};
let startDate = new Date(); startDate.setHours(0,0,0,0);
let nbDays = 15;
let activeFilters = new Set(ACTIVITIES.map(a => a.id));
let popCell = null;

// ── UTILS ────────────────────────────────────────────────────
const key  = (t,d) => t+'_'+d;
const esc  = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const isWknd  = d => { let x=new Date(startDate); x.setDate(x.getDate()+d); return x.getDay()===0||x.getDay()===6; };
const fmtDate = d => { let x=new Date(startDate); x.setDate(x.getDate()+d); return ['Di','Lu','Ma','Me','Je','Ve','Sa'][x.getDay()]+'<br>'+x.getDate(); };
const teamDomAct = t => { const c={}; t.compagnons.forEach(x=>{c[x.actId]=(c[x.actId]||0)+1;}); return Object.entries(c).sort((a,b)=>b[1]-a[1])[0]?.[0]||'autre'; };

function monthHeaders(){
  let res=[],cur=null;
  for(let i=0;i<nbDays;i++){
    let x=new Date(startDate); x.setDate(x.getDate()+i);
    let m=x.toLocaleString('fr-FR',{month:'long',year:'numeric'});
    if(!cur||cur.name!==m){cur={name:m,count:1};res.push(cur);}else cur.count++;
  }
  return res;
}

// ── SYNC STATE ───────────────────────────────────────────────
function setSyncState(state){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  dot.className='sync-dot '+state;
  lbl.textContent=state==='ok'?'Synchronisé':state==='syncing'?'Sync…':'Hors ligne';
}

// ── FIREBASE SAVE ────────────────────────────────────────────
async function saveTeams(){
  setSyncState('syncing');
  try{ await set(ref(db,TEAMS_REF), JSON.parse(JSON.stringify(teams))); setSyncState('ok'); }
  catch(e){ setSyncState('err'); showToast('Erreur sauvegarde !'); }
}
async function saveCells(){
  setSyncState('syncing');
  try{ await set(ref(db,CELLS_REF), Object.keys(cells).length ? cells : null); setSyncState('ok'); }
  catch(e){ setSyncState('err'); showToast('Erreur sauvegarde !'); }
}
async function saveRange(){
  try{ await set(ref(db,RANGE_REF), { start:startDate.toISOString().split('T')[0], days:nbDays }); }catch(e){}
}

// ── FIREBASE LISTEN ──────────────────────────────────────────
onValue(ref(db,TEAMS_REF), snap=>{
  const d=snap.val();
  if(d&&Array.isArray(d)){ teams=d; render(); buildFilters(); }
  setSyncState('ok');
}, ()=>setSyncState('err'));

onValue(ref(db,CELLS_REF), snap=>{
  cells=snap.val()||{}; render();
});

onValue(ref(db,RANGE_REF), snap=>{
  const d=snap.val();
  if(d){
    startDate=new Date(d.start+'T00:00:00');
    nbDays=d.days;
    document.getElementById('start-date').value=d.start;
    document.getElementById('nb-days').value=d.days;
    render();
  }
});

// ── RENDER ───────────────────────────────────────────────────
function render(){
  const g=document.getElementById('gantt');
  const mh=monthHeaders();
  let h='<thead><tr><th class="team-col" rowspan="2" style="vertical-align:bottom;padding-bottom:8px">Équipes</th>';
  mh.forEach(m=>{ h+=`<th colspan="${m.count}" class="month-hd">${m.name}</th>`; });
  h+='</tr><tr>';
  for(let d=0;d<nbDays;d++) h+=`<th${isWknd(d)?' class="wknd"':''}>${fmtDate(d)}</th>`;
  h+='</tr></thead><tbody>';

  teams.forEach((team,ti)=>{
    const domActId=teamDomAct(team);
    const domAct=actById(domActId);
    if(!activeFilters.has(domActId)) return;

    let compHtml='';
    team.compagnons.forEach((c,ci)=>{
      const act=actById(c.actId);
      compHtml+=`<div class="compagnon-row">
        <button class="comp-act-btn" style="background:${act.bg}" title="${act.label}" onclick="openActPop(event,${ti},${ci})">
          <i class="ti ${act.icon}" style="color:${act.text};font-size:12px"></i>
        </button>
        <span class="comp-name" contenteditable="true" data-ti="${ti}" data-ci="${ci}"
          onblur="renameComp(this)" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">${esc(c.name)}</span>
        <span class="del-comp-btn" onclick="delComp(${ti},${ci})"><i class="ti ti-x" style="font-size:10px"></i></span>
      </div>`;
    });
    compHtml+=`<span class="add-comp-btn" onclick="addComp(${ti})"><i class="ti ti-plus" style="font-size:10px"></i> compagnon</span>`;

    h+=`<tr><td class="team-cell" style="border-left:3px solid ${domAct.bg}">${compHtml}</td>`;
    for(let d=0;d<nbDays;d++){
      const k=key(ti,d); const c=cells[k]; const wk=isWknd(d);
      let chH='<div class="cell-chantier"></div>', taH='<div class="cell-tache"></div>';
      if(c){
        chH=`<div class="cell-chantier" style="background:${domAct.bg};color:${domAct.text}">${esc(c.chantier)}</div>`;
        taH=`<div class="cell-tache" style="background:${domAct.tBg};color:${domAct.text};border-color:${domAct.bg}">${esc(c.tache||'')}</div>`;
      }
      h+=`<td class="day-cell${wk?' wknd':''}" onclick="openCellPop(event,${ti},${d})"><div class="cell-inner">${chH}${taH}</div></td>`;
    }
    h+='</tr>';
  });
  h+='</tbody>';
  g.innerHTML=h;
}

// ── FILTRES ──────────────────────────────────────────────────
function buildFilters(){
  const el=document.getElementById('act-filters'); el.innerHTML='';
  const allOn=activeFilters.size===ACTIVITIES.length;
  const allChip=document.createElement('div');
  allChip.className='act-chip'+(allOn?'':' off');
  allChip.style.cssText='background:#F1EFE8;color:#444441;border-color:#D3D1C7';
  allChip.innerHTML='<i class="ti ti-layout-grid"></i> Toutes';
  allChip.onclick=()=>{ if(allOn)activeFilters.clear(); else ACTIVITIES.forEach(a=>activeFilters.add(a.id)); buildFilters(); render(); };
  el.appendChild(allChip);
  ACTIVITIES.forEach(a=>{
    const on=activeFilters.has(a.id);
    const chip=document.createElement('div');
    chip.className='act-chip'+(on?'':' off');
    chip.style.cssText=`background:${a.bg};color:${a.text};border-color:${a.bg}`;
    chip.innerHTML=`<i class="ti ${a.icon}"></i> ${a.label}`;
    chip.onclick=()=>{ if(on)activeFilters.delete(a.id); else activeFilters.add(a.id); buildFilters(); render(); };
    el.appendChild(chip);
  });
}

// ── COMPAGNONS ───────────────────────────────────────────────
window.renameComp=function(el){
  const ti=parseInt(el.dataset.ti),ci=parseInt(el.dataset.ci);
  const v=el.innerText.trim();
  if(v)teams[ti].compagnons[ci].name=v; else el.innerText=teams[ti].compagnons[ci].name;
  saveTeams();
};
window.addComp=function(ti){ teams[ti].compagnons.push({name:'Nouveau',actId:'pose'}); render(); saveTeams(); };
window.delComp=function(ti,ci){
  if(teams[ti].compagnons.length<=1){ showToast('Au moins 1 compagnon requis'); return; }
  teams[ti].compagnons.splice(ci,1); render(); saveTeams();
};
window.addTeam=function(){
  teams.push({name:'Nouvelle équipe',compagnons:[{name:'Compagnon',actId:'pose'}]});
  render(); buildFilters(); saveTeams();
};

// ── ACTIVITÉ POPUP ───────────────────────────────────────────
window.openActPop=function(e,ti,ci){
  e.stopPropagation();
  const pop=document.getElementById('act-popup'); pop.innerHTML='';
  ACTIVITIES.forEach(a=>{
    const opt=document.createElement('div'); opt.className='act-opt';
    opt.innerHTML=`<div class="act-dot" style="background:${a.bg}"></div><i class="ti ${a.icon}" style="font-size:14px;color:${a.text}"></i><span>${a.label}</span>`;
    opt.onclick=()=>{ teams[ti].compagnons[ci].actId=a.id; closeAll(); render(); buildFilters(); saveTeams(); };
    pop.appendChild(opt);
  });
  pop.classList.add('open');
  document.getElementById('overlay').classList.add('open');
  const rect=e.target.closest('.comp-act-btn').getBoundingClientRect();
  let x=rect.right+6, y=rect.top;
  if(x+210>window.innerWidth) x=rect.left-210;
  if(y+200>window.innerHeight) y=window.innerHeight-210;
  pop.style.left=x+'px'; pop.style.top=y+'px';
};

// ── CELL POPUP ───────────────────────────────────────────────
window.openCellPop=function(e,ti,d){
  e.stopPropagation();
  popCell={ti,d};
  const c=cells[key(ti,d)]||{};
  document.getElementById('cell-popup-title').textContent=teams[ti]?.name||'Chantier';
  document.getElementById('inp-chantier').value=c.chantier||'';
  document.getElementById('inp-tache').value=c.tache||'';
  document.getElementById('cell-popup').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('inp-chantier').focus(),100);
};
window.popOk=function(){
  if(!popCell) return;
  const ch=document.getElementById('inp-chantier').value.trim();
  const ta=document.getElementById('inp-tache').value.trim();
  const k=key(popCell.ti,popCell.d);
  if(ch||ta){ cells[k]={chantier:ch,tache:ta}; } else { delete cells[k]; }
  closeAll(); render(); saveCells();
};
window.popDelete=function(){
  if(!popCell) return;
  delete cells[key(popCell.ti,popCell.d)];
  closeAll(); render(); saveCells();
};
window.closeAll=function(){
  document.getElementById('cell-popup').classList.remove('open');
  document.getElementById('act-popup').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  popCell=null;
};

document.getElementById('inp-tache').addEventListener('keydown',e=>{ if(e.key==='Enter') popOk(); });
document.getElementById('inp-chantier').addEventListener('keydown',e=>{ if(e.key==='Tab'){e.preventDefault();document.getElementById('inp-tache').focus();} });

// ── RANGE ────────────────────────────────────────────────────
window.applyRange=function(){
  const dv=document.getElementById('start-date').value;
  if(dv) startDate=new Date(dv+'T00:00:00');
  nbDays=Math.max(5,Math.min(60,parseInt(document.getElementById('nb-days').value)||15));
  render(); saveRange();
};
window.clearAllCells=function(){
  if(confirm('Effacer toutes les saisies chantier ?')){ cells={}; render(); saveCells(); }
};

// ── TOAST ────────────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ── INIT ─────────────────────────────────────────────────────
const today=new Date(); today.setHours(0,0,0,0);
let dow=today.getDay(); if(dow===0)dow=7; today.setDate(today.getDate()-(dow-1));
startDate=today;
document.getElementById('start-date').value=today.toISOString().split('T')[0];
setSyncState('syncing');
buildFilters();
render();
</script>
</body>
</html>
